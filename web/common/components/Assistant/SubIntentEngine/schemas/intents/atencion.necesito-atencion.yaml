intent_id: atencion.necesito-atencion
version: 1

action_name: "Necesito atención"
description: "Contanos qué te pasa; te guiamos a turno ambulatorio, teleconsulta o derivación según el caso."
# Mismo permiso de autogestión de turno hasta existir ruta dedicada de atención.
rbac_route: "/api/turnos/crear-como-paciente"
keywords:
  - necesito atención
  - necesito atencion
  - me siento mal
  - me duele
  - qué hago
  - ayuda médica
  - ver un médico
  - consulta médica
  - atención médica

intent_semantics:
  goal: >-
    Entender por qué el paciente busca ayuda (triage breve) y conducirlo a turno presencial o teleconsulta.
    Presencial: puede elegir cualquier servicio con turnos. Videollamada: atención con clínico/generalista.
  how: >-
    Síntoma nuevo: motivo → ¿urgente? → categoría o zona → modalidad → servicio.
    Seguimiento crónico: motivo → ¿urgente? → plan de tratamiento (care plan) → modalidad → servicio filtrado.
  preconditions:
    - El usuario puede autogestionar turnos ambulatorios no urgentes.
  constraints:
    - Signos de alarma (banda A): no se completa reserva; pantalla de urgencia (sin paso de modalidad).
    - Tras triage no urgente, modalidad (presencial / videollamada) es obligatoria siempre.
    - Seguimiento crónico: tras descartar urgencia, el paciente elige plan activo; servicios filtrados desde care plan.
    - Presencial síntoma nuevo: listado completo; triage por zona solo prioriza.
    - Videollamada: solo clínico/generalista; especialista remoto requiere derivación vigente.
    - Teleconsulta con clínica según triage, servicio y agenda del profesional.
  outcome:
    - Turno con servicio elegido (presencial) o clínico remoto; triage persistido.
  keyphrases:
    - necesito ayuda con un síntoma
    - quiero atención médica
    - no sé si ir a urgencias o pedir turno

draft_hydrator:
  handler: scheduling.reserva_triage

draft_keys_extra:
  - tipo_atencion
  - teleconsulta_ofrecible
  - servicio_reserva_rol
  - triage_servicio_rol_ideal
  - triage_codigo_servicio_resolutor
  - reserva_servicio_autogestion
  - reserva_servicio_mensaje
  - reserva_modo_hub_paciente
  - fecha_turno
  - care_plan_id
  - triage_raiz
  - triage_urgente
  - triage_alarmas
  - triage_zona
  - triage_evolucion
  - triage_nota
  - reserva_triage_halt
  - urgency_band

subintents:
  - id: triage_raiz
    assistant_text: "Motivo"
    provides:
      - draft.triage_raiz
    next_routing:
      - when:
          default: true
        next: triage_urgente
    open_ui:
      action_id: turnos.reserva-triage-paso
      params:
        step: raiz

  - id: triage_urgente
    assistant_text: "Urgencia"
    requires:
      - draft.triage_raiz
    provides:
      - draft.triage_urgente
    next_routing:
      - when:
          draft_equals:
            triage_urgente: urgente_si
        next: triage_urgencia_tipo
      - when:
          draft_equals:
            triage_raiz: sintoma_nuevo
        next: triage_zona
      - when:
          draft_equals:
            triage_raiz: seguimiento_cronico
        next: select_care_plan
      - when:
          default: true
        next: select_tipo_atencion
    open_ui:
      action_id: turnos.reserva-triage-paso
      params:
        step: urgente

  - id: triage_urgencia_tipo
    assistant_text: "Qué te preocupa"
    requires:
      - draft.triage_urgente
    provides:
      - draft.triage_alarmas
    next_routing:
      - when:
          draft_equals:
            reserva_triage_halt: "1"
        next: triage_urgencia
      - when:
          default: true
        next: select_tipo_atencion
    open_ui:
      action_id: turnos.reserva-triage-paso
      params:
        step: urgencia_tipo
        triage_urgente: "draft.triage_urgente"

  - id: triage_zona
    assistant_text: "Zona"
    requires:
      - draft.triage_raiz
      - draft.triage_urgente
    provides:
      - draft.triage_zona
    next: select_tipo_atencion
    open_ui:
      action_id: turnos.reserva-triage-paso
      params:
        step: zona
        triage_raiz: "draft.triage_raiz"

  - id: select_care_plan
    assistant_text: "Tu tratamiento"
    requires:
      - draft.triage_raiz
      - draft.triage_urgente
    provides:
      - draft.care_plan_id
    next: select_tipo_atencion
    open_ui:
      action_id: clinical.care-plan.ver-tratamiento-paciente

  - id: triage_urgencia
    assistant_text: "Urgencia"
    requires:
      - draft.reserva_triage_halt
    provides: []
    next: ""
    terminal_without_submit: true
    flow_dismiss:
      label: "Entendido"
    flow_actions:
      - label: "Llamar al 107"
        href: "tel:107"
        variant: danger
    open_ui:
      action_id: turnos.reserva-triage-urgencia

  - id: select_tipo_atencion
    assistant_text: "Modalidad"
    requires:
      - draft.triage_raiz
    provides:
      - draft.tipo_atencion
    next_routing:
      - when:
          draft_equals:
            tipo_atencion: teleconsulta
        next: select_dia_teleconsulta
      - when:
          default: true
        next: select_servicio
    open_ui:
      action_id: turnos.reserva-triage-paso
      params:
        step: modalidad
        step_title: "¿Cómo preferís la atención?"
        triage_raiz: "draft.triage_raiz"
        triage_urgente: "draft.triage_urgente"
        triage_alarmas: "draft.triage_alarmas"
        triage_zona: "draft.triage_zona"
        care_plan_id: "draft.care_plan_id"

  - id: select_servicio
    assistant_text: "Servicio"
    requires:
      - draft.tipo_atencion
    provides:
      - draft.id_servicio_asignado
    next: select_efector
    hint:
      entity: servicio
      match_property: nombre
    open_ui:
      action_id: servicios.elegir-acepta-turnos
      params:
        tipo_atencion: "draft.tipo_atencion"
        triage_raiz: "draft.triage_raiz"
        triage_urgente: "draft.triage_urgente"
        triage_alarmas: "draft.triage_alarmas"
        triage_zona: "draft.triage_zona"
        care_plan_id: "draft.care_plan_id"

  - id: select_efector
    assistant_text: "Centro de salud"
    requires:
      - draft.id_servicio_asignado
      - draft.tipo_atencion
    provides:
      - draft.id_efector
    next: select_profesional
    hint:
      entity: efector
      match_property: nombre
    chooser:
      when_user_says_nearby:
        open_ui:
          action_id: efectores.listar-por-servicio-cercano
          params:
            id_servicio: "draft.id_servicio_asignado"
      otherwise:
        open_ui:
          action_id: efectores.listar-por-servicio
          params:
            id_servicio: "draft.id_servicio_asignado"

  - id: select_profesional
    assistant_text: "Profesional"
    requires:
      - draft.id_efector
      - draft.id_servicio_asignado
    provides:
      - draft.id_profesional_efector_servicio
    next: select_dia
    hint:
      entity: profesional
      match_property: nombre
    open_ui:
      action_id: profesional-efector-servicio.listar-por-efector-servicio-acepta-turnos
      params:
        id_efector: "draft.id_efector"
        id_servicio: "draft.id_servicio_asignado"
        tipo_atencion: "draft.tipo_atencion"

  - id: select_dia
    assistant_text: "Día"
    requires:
      - draft.id_profesional_efector_servicio
    provides:
      - draft.fecha_turno
    next: select_slot
    open_ui:
      action_id: turnos.slots-dias-disponibles-como-paciente
      params:
        id_servicio: "draft.id_servicio_asignado"
        id_efector: "draft.id_efector"
        id_profesional_efector_servicio: "draft.id_profesional_efector_servicio"

  - id: select_slot
    assistant_text: "Horario"
    requires:
      - draft.id_profesional_efector_servicio
      - draft.fecha_turno
    provides:
      - draft.slot_id
    next: ""
    open_ui:
      action_id: turnos.slots-disponibles-como-paciente
      params:
        id_servicio: "draft.id_servicio_asignado"
        id_efector: "draft.id_efector"
        id_profesional_efector_servicio: "draft.id_profesional_efector_servicio"
        fecha: "draft.fecha_turno"

  - id: select_dia_teleconsulta
    assistant_text: "Día"
    requires:
      - draft.tipo_atencion
    provides:
      - draft.fecha_turno
    next: select_slot_teleconsulta
    open_ui:
      action_id: turnos.slots-dias-disponibles-como-paciente
      params:
        reserva_modo: teleconsulta_hub
        triage_raiz: "draft.triage_raiz"
        triage_urgente: "draft.triage_urgente"
        triage_alarmas: "draft.triage_alarmas"
        triage_zona: "draft.triage_zona"
        care_plan_id: "draft.care_plan_id"

  - id: select_slot_teleconsulta
    assistant_text: "Horario"
    requires:
      - draft.tipo_atencion
      - draft.fecha_turno
    provides:
      - draft.slot_id
    next: ""
    open_ui:
      action_id: turnos.slots-disponibles-como-paciente
      params:
        reserva_modo: teleconsulta_hub
        triage_raiz: "draft.triage_raiz"
        triage_urgente: "draft.triage_urgente"
        triage_alarmas: "draft.triage_alarmas"
        triage_zona: "draft.triage_zona"
        care_plan_id: "draft.care_plan_id"
        fecha: "draft.fecha_turno"

flow_submit:
  action_id: turnos.crear-como-paciente
  params:
    slot_id: "draft.slot_id"
    id_servicio_asignado: "draft.id_servicio_asignado"
    id_efector: "draft.id_efector"
    triage_raiz: "draft.triage_raiz"
    triage_urgente: "draft.triage_urgente"
    triage_alarmas: "draft.triage_alarmas"
    triage_zona: "draft.triage_zona"
    care_plan_id: "draft.care_plan_id"
    triage_nota: "draft.triage_nota"
    tipo_atencion: "draft.tipo_atencion"
