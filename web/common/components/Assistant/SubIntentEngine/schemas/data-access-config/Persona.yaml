# Grupos de atributos — entidad Persona (permiso fino por grupo + definición de campos).
entity: Persona
model: common\models\Persona
groups:
  # Campos del formulario: tabla data_access_attribute_field.
  identidad_basica: {}
  sexo_genero:
    attributes: [sexo_biologico, genero]
  edad_exacta:
    attributes:
      fecha_nacimiento:
        type: date
        label: Fecha de nacimiento
  identificadores:
    attributes:
      documento:
        type: text
        label: Documento
      id_tipodoc:
        type: text
        label: Tipo de documento
