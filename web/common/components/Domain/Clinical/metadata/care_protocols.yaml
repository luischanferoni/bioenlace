# Protocolos de cuidado (PlanDefinition-lite). Definición → acciones con draft prefilled.
# No confundir con CarePack/CareCohort (packs IA).
version: "1"

# Outcomes estables para next_routing del flow (sin if protocol_id en orquestadores).
# modalidad | captura_mensaje
default_outcome: captura_mensaje

protocols:
  - id: hta_control_periodico
    title: Control de hipertensión
    fhir_kind: PlanDefinition
    applies:
      condition_codes:
        - "I10"
        - "I11"
        - "I12"
        - "I13"
        - "I15"
    actions:
      - code: solicitar_turno
        label: Pedir turno de control
        description: Reservá un control de presión / seguimiento.
        outcome: modalidad
        draft:
          triage_raiz: seguimiento_cronico
      - code: consulta_mensaje
        label: Consulta por mensaje
        description: Escribile al equipo sobre tu hipertensión.
        outcome: captura_mensaje
        draft:
          intake_tipo: consulta_general

  - id: diabetes_control_periodico
    title: Control de diabetes
    fhir_kind: PlanDefinition
    applies:
      condition_codes:
        - "E10"
        - "E11"
        - "E12"
        - "E13"
        - "E14"
    actions:
      - code: solicitar_turno
        label: Pedir turno de control
        description: Reservá un control de diabetes.
        outcome: modalidad
        draft:
          triage_raiz: seguimiento_cronico
      - code: consulta_mensaje
        label: Consulta por mensaje
        description: Contá cómo venís con el tratamiento.
        outcome: captura_mensaje
        draft:
          intake_tipo: consulta_general

  - id: asma_control_periodico
    title: Control de asma
    fhir_kind: PlanDefinition
    applies:
      condition_codes:
        - "J45"
        - "J46"
    actions:
      - code: solicitar_turno
        label: Pedir turno de control
        outcome: modalidad
        draft:
          triage_raiz: seguimiento_cronico
      - code: consulta_mensaje
        label: Consulta por mensaje
        outcome: captura_mensaje
        draft:
          intake_tipo: consulta_general
