id: temporal_normalization.v1
version: 1

phrases:
  - meaning: next_available
    examples:
      - "lo antes posible"
      - "próximo"
      - "proximo"
  - meaning: morning
    examples:
      - "mañana"
      - "a la mañana"
  - meaning: afternoon
    examples:
      - "tarde"
      - "a la tarde"

output:
  # El motor devuelve tags normalizados en draft, no fechas concretas.
  draft_fields:
    - desired_time_bucket
    - desired_strategy

