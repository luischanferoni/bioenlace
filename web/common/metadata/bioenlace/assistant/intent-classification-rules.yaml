# Reglas declarativas de clasificaciĂłn NL â ajustes de score y fallbacks operativos.
# El motor {@see IntentClassificationRulesService} interpreta este archivo; no duplicar en PHP.
version: 1

vocab:
  edit_verbs: '\b(editar|modificar|actualizar|cambiar|corregir|ajustar|configurar)\b'
  alta_verbs: '\b(crear|agregar|nuevo|nueva|alta|asociar|dar de alta)\b'
  agenda_targets: '\b(agenda|horario|horarios|disponibilidad|cupo|formas?\s+de\s+atencion|forma\s+de\s+atencion|teleconsulta|intervalo|modalidad)\b'
  own_scope: '\b(mi|mis)\s+(agenda|horario|horarios|formas?\s+de\s+atencion)\b'
  staff_third_party: '\b(profesional|medico|doctor|personal)\b'
  agenda_de_uno: '\b(agenda|horario|horarios)\s+de\s+(un|el|la|los|las)\b'
  config_topics: '\b(formas?\s+de\s+atencion|forma\s+de\s+atencion|teleconsulta|intervalo)\b'
  list_verbs: '\b(listar|mostrar|mostrame|ver listado|nombres de|quienes|quien es|quiĂŠn es|plantilla)\b'
  count_verbs: '\b(cuantos|cuantos hay|total de|conteo|cantidad de|numero de|cuenta)\b'
  distribucion_servicio_phrases:
    - profesionales por servicio
    - distribucion por servicio
    - distribuciĂłn por servicio
    - distribucion por especialidad
  list_phrases:
    - profesionales del centro
    - medicos del centro
  clinical_symptoms: '\b(problema|dolor|duele|sintoma|sĂ­ntoma|malestar|enfermo|fiebre|tos|nausea|nĂĄusea|vomito|vĂłmito|mareo|hinchazon|hinchazĂłn|presion|presiĂłn|diabetes|hipertension|hipertensiĂłn|chichon|chichĂłn|golpe|hematoma|moreton|moretĂłn|bulto|hinchado|inflamado|cabeza|manos|pies|brazo|pierna|herida|sangra|sangrado)\b'
  scheduling_ops: '\b(turno|turnos|reservar|sacar turno|cancelar turno|cancelar|agenda|cita|reprogramar|sobreturno)\b'
  help_menu: '\b(ayuda|quĂŠ puedo|que puedo|menu|menĂş|opciones|quĂŠ hace|que hace|quĂŠ se puede|que se puede|mostrar acciones)\b'
  greeting: '\b(hola|buenos|gracias|quĂŠ tal|que tal|como estas|cĂłmo estĂĄs)\b'
  resumen_phrases: '\b(resumen de|resumen)\b'
  licencia_topics: '\b(licencia|permiso|ausencia|vacacion|vacaciones|franco|condicion laboral|condiciĂłn laboral)\b'
  own_licencia: '\b(mi|mis)\s+(licencia|permiso|ausencia|vacaciones|condicion laboral|condiciĂłn laboral)\b'
  staff_licencia_third: '\b(licencia|permiso|ausencia|condicion laboral|condiciĂłn laboral)\s+(del|de un|de la|de otro|profesional|medico|mĂŠdico|colega)\b'

match_rules:
  staff_agenda_config_edit:
    require_all: [edit_verbs, agenda_targets]
    forbid_any: [alta_verbs, own_scope]
    require_any: [staff_third_party, agenda_de_uno, config_topics]
    ai_hint: >-
      Si el mensaje pide modificar/editar agenda, horarios, formas de atenciĂłn, teleconsulta,
      intervalo entre turnos de un profesional (sin crear/alta), priorizĂĄ el intent de ediciĂłn dispersa
      staff cuyo goal/how describa modificar datos por superficie o aspectos autorizados.

  own_agenda_config_edit:
    require_all: [edit_verbs, own_scope, agenda_targets]
    forbid_any: [alta_verbs]
    ai_hint: >-
      Si el mensaje pide modificar la agenda u horarios propios (mi/mis), priorizĂĄ el intent
      de ediciĂłn dispersa cuyo catĂĄlogo cubra ediciĂłn de agenda del profesional autenticado.

  staff_list_not_count:
    require_any: [list_verbs]
    forbid_any: [count_verbs]
    require_phrase_any: list_phrases

  staff_count:
    require_any: [count_verbs]

  staff_distribucion_servicio:
    require_phrase_any: distribucion_servicio_phrases

  staff_data_access_list:
    require_any: [list_verbs]

  staff_data_access_list_phrase:
    require_phrase_any: list_phrases

  staff_data_access_count_or_resumen:
    require_any: [count_verbs, resumen_phrases]

  staff_data_access_edit:
    require_all: [edit_verbs]
    forbid_any: [scheduling_ops]

  clinical_symptom:
    require_any: [clinical_symptoms]

  scheduling_operational:
    require_any: [scheduling_ops]

  help_menu_query:
    require_any: [help_menu]

  greeting:
    require_any: [greeting]

  own_condicion_laboral:
    require_all: [licencia_topics, own_licencia]

  staff_condicion_laboral:
    require_any: [licencia_topics, staff_licencia_third]
    forbid_any: [own_licencia]

  staff_identidad_edit:
    require_all: [edit_verbs, staff_third_party]
    forbid_any: [agenda_targets, alta_verbs, scheduling_ops]

score_adjustments:
  - when_rule: staff_condicion_laboral
    apply:
      - intent_id: condicion-laboral.editar-staff
        delta: 40
      - intent_id_prefix: licencia.cargar-para
        delta: 20

  - when_rule: own_condicion_laboral
    apply:
      - intent_id: condicion-laboral.editar-propio
        delta: 40
      - intent_id_prefix: licencia.cargar-como
        delta: 20

  - when_rule: staff_agenda_config_edit
    apply:
      - intent_id: profesional-agenda.configurar-staff
        delta: 45
      - intent_id: data-access.editar
        delta: 15
      - intent_id: profesional-efector-servicio.crear-flow
        delta: -30
      - intent_id_prefix: licencia.cargar
        delta: -35

  - when_rule: own_agenda_config_edit
    apply:
      - intent_id: profesional-agenda.configurar-propio
        delta: 45
      - intent_id: data-access.editar
        delta: 15
      - intent_id: profesional-efector-servicio.crear-flow
        delta: -30
      - intent_id_prefix: licencia.cargar
        delta: -35

  - when_rule: staff_identidad_edit
    apply:
      - intent_id: profesional-identidad.editar-staff
        delta: 40
      - intent_id: data-access.editar
        delta: 10

  - when_rule: staff_distribucion_servicio
    apply:
      - intent_id: profesionales.distribucion-servicio-efector
        delta: 40
      - intent_id: data-access.info
        delta: -15

  - when_rule: staff_list_not_count
    when_not_rule: staff_count
    apply:
      - intent_id: profesionales.listado-efector
        delta: 35
      - intent_id: data-access.listar
        delta: 10
      - intent_id: data-access.info
        delta: -20

  - when_rule: staff_list_not_count
    when_also: staff_count
    apply:
      - intent_id: profesionales.listado-efector
        delta: 15
      - intent_id: data-access.listar
        delta: 5

  - when_rule: staff_count
    apply:
      - intent_id: profesionales.conteo-efector
        delta: 35
      - intent_id: data-access.info
        delta: 5

operational_fallbacks:
  - id: staff_agenda_config_edit_nl
    requires_staff_data_access: true
    when_any_rule: [staff_agenda_config_edit]
    intent_id: profesional-agenda.configurar-staff
    confidence: 0.9
    method: rules_declarative_fallback

  - id: own_agenda_config_edit_nl
    requires_staff_data_access: true
    when_any_rule: [own_agenda_config_edit]
    intent_id: profesional-agenda.configurar-propio
    confidence: 0.9
    method: rules_declarative_fallback

  - id: condicion_laboral_family_nl
    when_any_rule: [own_condicion_laboral, staff_condicion_laboral]
    intent_family: condicion-laboral.edit
    confidence: 0.88
    method: rules_family_fallback

chat_preprocess:
  entity_categories:
    - servicio
    - efector
    - persona
    - profesional
    - turno

  staff_data_access_rules:
    query_any:
      - staff_data_access_count_or_resumen
      - staff_data_access_list
      - staff_data_access_list_phrase
    edit: staff_data_access_edit
    operational_any:
      - staff_data_access_count_or_resumen
      - staff_data_access_list
      - staff_data_access_list_phrase
      - staff_data_access_edit

  prompt:
    intro: 'AnalizĂĄ el mensaje del usuario para un asistente de salud.'
    rules:
      - 'user_goal operational si pide hacer algo en el sistema (turno, agenda, cancelar), consulta datos operativos del centro (cuĂĄntos profesionales hay, planta profesional, listar mĂŠdicos del efector) o modificar datos del personal (editar nombre, cambiar horarios de agenda del centro).'
      - 'conversational si es saludo, consulta de salud/sĂ­ntomas, lesiones (golpe, chichĂłn, bulto), malestar o charla sin pedir una acciĂłn del sistema (no confundir con informational).'
      - 'informational solo si pregunta quĂŠ puede hacer la app, pide ayuda/menĂş o lista de opciones; no usar informational para sĂ­ntomas, quejas clĂ­nicas ni consultas de plantilla/conteo de profesionales del efector.'
      - 'No uses category servicio para sĂ­ntomas, partes del cuerpo ni malestar; esas menciones van solo en normalized_text.'
      - 'meta: preguntas sobre el asistente o la app (no operativas).'
      - 'normalized_text: corregĂ­ ortografĂ­a y expandĂ­ abreviaturas clĂ­nicas comunes; conservĂĄ el sentido del mensaje.'
      - 'extractions: solo menciones de entidades del mundo (servicio, centro, persona), no verbos ni la acciĂłn.'
      - 'synonyms: mĂĄximo 2 strings por extracciĂłn.'

  goal_overrides:
    - when_rule: clinical_symptom
      from_goals: [informational, unclear]
      to_goal: conversational
    - when_rule: clinical_symptom
      from_goal: operational
      when_not_rule: scheduling_operational
      to_goal: conversational
    - when_any_rule: [staff_data_access_count_or_resumen, staff_data_access_list, staff_data_access_list_phrase, staff_data_access_edit]
      to_goal: operational

  heuristic_fallback:
    - when_rule: scheduling_operational
      goal: operational
    - when_any_rule: [staff_data_access_count_or_resumen, staff_data_access_list, staff_data_access_list_phrase, staff_data_access_edit]
      goal: operational
    - when_rule: help_menu_query
      goal: informational
    - when_rule: greeting
      goal: conversational
    - when_rule: clinical_symptom
      goal: conversational

conversational_channel:
  stable_prompt: |
    Sos el asistente de Bioenlace, una aplicaciĂłn de salud donde las personas reservan turnos con profesionales y centros de la red.

    RespondĂŠ en espaĂąol, breve y amable (3â5 oraciones salvo que pidan mĂĄs detalle).
    No inventes datos clĂ­nicos, diagnĂłsticos ni confirmes turnos ya hechos.

    Cuando describan sĂ­ntomas, lesiones o malestar:
    1) MostrĂĄ empatĂ­a y orientaciĂłn prudente (no reemplazĂĄs la consulta mĂŠdica).
    2) IndicĂĄ quĂŠ tipo de profesional o servicio suele ser apropiado para evaluar ese cuadro (ej. clĂ­nica mĂŠdica o medicina general, traumatologĂ­a por golpe o chichĂłn, pediatrĂ­a si es un niĂąo). No inventes nombres de mĂŠdicos ni centros concretos salvo que aparezcan en el contexto clĂ­nico del paciente.
    3) ConectĂĄ con Bioenlace: explicĂĄ que pueden reservar un turno acĂĄ mismo escribiendo quĂŠ necesitan (ej. "Quiero turno con clĂ­nica mĂŠdica" o "Sacar turno de traumatologĂ­a").
    4) Si preguntan cĂłmo contactar al profesional, aclarĂŠ que el contacto es agendando una consulta por la app; no des telĂŠfonos, emails ni direcciones inventadas.

    Si piden una acciĂłn operativa concreta (turno, cancelar, ver agenda), invitalos a decirlo con sus palabras; no hace falta listar menĂşs largos.

    Si hay historial reciente, continuĂĄ la charla sin repetir lo ya respondido.
  empty_response_fallback: >-
    Entiendo tu consulta. Te recomiendo que un profesional te evalĂşe en persona.
    En Bioenlace podĂŠs reservar un turno escribiendo, por ejemplo, "Quiero turno con clĂ­nica mĂŠdica".
  booking_button:
    when_rule: clinical_symptom
    intent_priority:
      - atencion.necesito-atencion
      - turnos.crear-como-paciente
      - turnos.crear-para-paciente
    intent_prefix_fallback: turnos.crear
    labels:
      atencion.necesito-atencion: Necesito atenciĂłn
      turnos.crear-como-paciente: Reservar turno
      turnos.crear-para-paciente: Reservar turno
