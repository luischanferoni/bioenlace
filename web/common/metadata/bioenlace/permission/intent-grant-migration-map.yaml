version: 1

# Mapeo idempotente grants rol → intents (fase 3 piloto condición laboral).
# Ejecutar: php yii catalog-permission/migrate-grants

role_grant_sources:
  - source_permission: licencia.cargar-como-profesional-flow
    intent_targets:
      - condicion-laboral.editar-propio
  - source_permission: licencia.cargar-para-profesional-flow
    intent_targets:
      - condicion-laboral.editar-staff
  - source_permission: Licencia.create
    intent_targets:
      - condicion-laboral.editar-propio
      - condicion-laboral.editar-staff
  - source_permission: data-access.info
    intent_targets:
      - profesionales.conteo-efector
      - profesionales.distribucion-servicio-efector
  - source_permission: DataAccess.info
    intent_targets:
      - profesionales.conteo-efector
      - profesionales.distribucion-servicio-efector
  - source_permission: data-access.listar
    intent_targets:
      - profesionales.listado-efector
  - source_permission: DataAccess.list
    intent_targets:
      - profesionales.listado-efector
  - source_permission: data-access.editar
    intent_targets:
      - profesional-agenda.configurar-propio
      - profesional-agenda.configurar-staff
      - profesional-identidad.editar-staff
  - source_permission: DataAccess.edit
    intent_targets:
      - profesional-agenda.configurar-propio
      - profesional-agenda.configurar-staff
      - profesional-identidad.editar-staff

# Futuro: Entidad.atributo.read|info|edit → intents concretos (fase 6).
attribute_grant_sources: []
