intent_id: agenda.crear-agenda-flow
version: 1

action_name: "Crear agenda"
description: "Guía conversacional para seleccionar profesional y servicio, y abrir la carga de agenda."
keywords:
  - agenda
  - crear agenda
  - cargar agenda
  - horarios
  - condición laboral

draft_keys_extra: []

subintents:
  - id: select_rrhh
    assistant_text: "Elegí el profesional al que querés crearle (o completarle) la agenda."
    requires:
      - draft.id_rr_hh
    provides:
      - draft.id_rr_hh
    next: select_servicio
    open_ui:
      action_id: rrhh.listar-por-efector-acepta-turnos

  - id: select_servicio
    assistant_text: "Ahora elegí el servicio asignado."
    requires:
      - draft.id_rr_hh
      - draft.id_servicio
    provides:
      - draft.id_servicio
    next: configurar_agenda
    open_ui:
      action_id: rrhh.listar-servicios-en-efector
      params:
        id_rr_hh: "draft.id_rr_hh"

  - id: configurar_agenda
    assistant_text: "Ahora cargá la agenda: cupo, forma de atención y horarios por día."
    requires:
      - draft.id_rr_hh
      - draft.id_servicio
    provides: []
    next: condicion_laboral
    open_ui:
      action_id: agenda.configurar-agenda
      params:
        id_rr_hh: "draft.id_rr_hh"
        id_servicio: "draft.id_servicio"

  - id: condicion_laboral
    assistant_text: "Por último, cargá la condición laboral (vigencia)."
    requires:
      - draft.id_rr_hh
    provides: []
    next: ""
    open_ui:
      action_id: agenda.editar-condicion-laboral
      params:
        id_rr_hh: "draft.id_rr_hh"

