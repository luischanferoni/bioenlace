intent_id: atencion.necesito-atencion
version: 1

action_name: "Necesito atención"
description: "Contanos qué te pasa; te guiamos a turno ambulatorio, teleconsulta o derivación según el caso."
# Mismo permiso de autogestión de turno hasta existir ruta dedicada de atención.
rbac_route: "/api/turnos/crear-como-paciente"
keywords:
  - necesito atención
  - necesito atencion
  - me siento mal
  - me duele
  - qué hago
  - ayuda médica
  - ver un médico
  - consulta médica
  - atención médica

intent_semantics:
  goal: >-
    Entender por qué el paciente busca ayuda (triage breve) y conducirlo a la vía adecuada;
    hoy la rama principal es reserva de turno ambulatorio con datos de triage persistidos.
  how: >-
    Motivo y alarmas → zona/detalle/evolución si aplica → servicio → modalidad (si el servicio y el caso lo permiten) → centro → profesional → día → horario → confirmación.
  preconditions:
    - El usuario puede autogestionar turnos cuando la rama es ambulatorio programable.
  constraints:
    - Signos de alarma (banda A): no se completa reserva; pantalla de urgencia.
    - Teleconsulta solo si el servicio y el triage lo permiten; si no, presencial fijo sin elección.
  outcome:
    - Turno creado con triage de reserva, u otra derivación cuando se agreguen ramas al catálogo.
  keyphrases:
    - necesito ayuda con un síntoma
    - quiero atención médica
    - no sé si ir a urgencias o pedir turno

draft_hydrator:
  handler: scheduling.reserva_triage

draft_keys_extra:
  - tipo_atencion
  - teleconsulta_ofrecible
  - fecha_turno
  - triage_raiz
  - triage_alarmas
  - triage_zona
  - triage_detalle
  - triage_evolucion
  - triage_nota
  - reserva_triage_halt
  - urgency_band

subintents:
  - id: triage_raiz
    assistant_text: "Motivo"
    provides:
      - draft.triage_raiz
    next_routing:
      - when:
          draft_equals:
            triage_raiz: sintoma_nuevo
        next: triage_alarmas
      - when:
          draft_equals:
            triage_raiz: control_cronico
        next: triage_alarmas
      - when:
          default: true
        next: select_servicio
    open_ui:
      action_id: turnos.reserva-triage-paso
      params:
        step: raiz

  - id: triage_alarmas
    assistant_text: "Alarmas"
    requires:
      - draft.triage_raiz
    provides:
      - draft.triage_alarmas
    next_routing:
      - when:
          draft_equals:
            reserva_triage_halt: "1"
        next: triage_urgencia
      - when:
          draft_equals:
            triage_raiz: sintoma_nuevo
        next: triage_zona
      - when:
          draft_equals:
            triage_raiz: control_cronico
        next: triage_evolucion
      - when:
          default: true
        next: select_servicio
    open_ui:
      action_id: turnos.reserva-triage-paso
      params:
        step: alarmas

  - id: triage_urgencia
    assistant_text: "Urgencia"
    requires:
      - draft.reserva_triage_halt
    provides: []
    next: ""
    terminal_without_submit: true
    flow_dismiss:
      label: "Entendido"
    flow_actions:
      - label: "Llamar al 107"
        href: "tel:107"
        variant: danger
    open_ui:
      action_id: turnos.reserva-triage-urgencia

  - id: triage_zona
    assistant_text: "Zona"
    requires:
      - draft.triage_raiz
      - draft.triage_alarmas
    provides:
      - draft.triage_zona
    next: triage_detalle
    open_ui:
      action_id: turnos.reserva-triage-paso
      params:
        step: zona
        triage_raiz: "draft.triage_raiz"

  - id: triage_detalle
    assistant_text: "Qué te pasa"
    requires:
      - draft.triage_zona
    provides:
      - draft.triage_detalle
    next: triage_evolucion
    open_ui:
      action_id: turnos.reserva-triage-paso
      params:
        step: detalle
        triage_zona: "draft.triage_zona"

  - id: triage_evolucion
    assistant_text: "Evolución"
    provides:
      - draft.triage_evolucion
    next: select_servicio
    open_ui:
      action_id: turnos.reserva-triage-paso
      params:
        step: evolucion

  - id: select_servicio
    assistant_text: "Servicio"
    provides:
      - draft.id_servicio_asignado
    next_routing:
      - when:
          draft_equals:
            teleconsulta_ofrecible: "0"
        next: select_efector
      - when:
          default: true
        next: select_tipo_atencion
    hint:
      entity: servicio
      match_property: nombre
    open_ui:
      action_id: servicios.elegir-acepta-turnos

  - id: select_tipo_atencion
    assistant_text: "Modalidad"
    requires:
      - draft.id_servicio_asignado
    provides:
      - draft.tipo_atencion
    next: select_efector
    open_ui:
      action_id: turnos.reserva-triage-paso
      params:
        step: modalidad
        id_servicio_asignado: "draft.id_servicio_asignado"
        triage_raiz: "draft.triage_raiz"
        triage_alarmas: "draft.triage_alarmas"
        triage_zona: "draft.triage_zona"
        triage_detalle: "draft.triage_detalle"
        triage_evolucion: "draft.triage_evolucion"

  - id: select_efector
    assistant_text: "Centro de salud"
    requires:
      - draft.id_servicio_asignado
      - draft.tipo_atencion
    provides:
      - draft.id_efector
    next: select_profesional
    hint:
      entity: efector
      match_property: nombre
    chooser:
      when_user_says_nearby:
        open_ui:
          action_id: efectores.listar-por-servicio-cercano
          params:
            id_servicio: "draft.id_servicio_asignado"
      otherwise:
        open_ui:
          action_id: efectores.listar-por-servicio
          params:
            id_servicio: "draft.id_servicio_asignado"

  - id: select_profesional
    assistant_text: "Profesional"
    requires:
      - draft.id_efector
      - draft.id_servicio_asignado
    provides:
      - draft.id_profesional_efector_servicio
    next: select_dia
    hint:
      entity: profesional
      match_property: nombre
    open_ui:
      action_id: profesional-efector-servicio.listar-por-efector-servicio-acepta-turnos
      params:
        id_efector: "draft.id_efector"
        id_servicio: "draft.id_servicio_asignado"
        tipo_atencion: "draft.tipo_atencion"

  - id: select_dia
    assistant_text: "Día"
    requires:
      - draft.id_profesional_efector_servicio
    provides:
      - draft.fecha_turno
    next: select_slot
    open_ui:
      action_id: turnos.slots-dias-disponibles-como-paciente
      params:
        id_servicio: "draft.id_servicio_asignado"
        id_efector: "draft.id_efector"
        id_profesional_efector_servicio: "draft.id_profesional_efector_servicio"

  - id: select_slot
    assistant_text: "Horario"
    requires:
      - draft.id_profesional_efector_servicio
      - draft.fecha_turno
    provides:
      - draft.slot_id
    next: ""
    open_ui:
      action_id: turnos.slots-disponibles-como-paciente
      params:
        id_servicio: "draft.id_servicio_asignado"
        id_efector: "draft.id_efector"
        id_profesional_efector_servicio: "draft.id_profesional_efector_servicio"
        fecha: "draft.fecha_turno"

flow_submit:
  action_id: turnos.crear-como-paciente
  params:
    slot_id: "draft.slot_id"
    id_servicio_asignado: "draft.id_servicio_asignado"
    id_efector: "draft.id_efector"
    triage_raiz: "draft.triage_raiz"
    triage_alarmas: "draft.triage_alarmas"
    triage_zona: "draft.triage_zona"
    triage_detalle: "draft.triage_detalle"
    triage_evolucion: "draft.triage_evolucion"
    triage_nota: "draft.triage_nota"
    tipo_atencion: "draft.tipo_atencion"
