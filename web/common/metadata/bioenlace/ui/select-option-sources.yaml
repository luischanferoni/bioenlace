# Fuentes de opciones para selects en UI JSON (Bioenlace).
# {@see UiSelectOptionSourceMetadata}
version: 1

source_aliases:
  condiciones_laborales:
    source: catalog
    catalog: condiciones_laborales

source_providers:
  efectores: organization
  servicios: organization
  profesionales: scheduling
  profesional-efector-servicio: scheduling
  slots_disponibles_paciente: scheduling

# Resolver aunque falte el param de depends_on (p. ej. servicios filtrados por id_efector).
depends_on_optional:
  - source: servicios
    filter: efector_servicios
