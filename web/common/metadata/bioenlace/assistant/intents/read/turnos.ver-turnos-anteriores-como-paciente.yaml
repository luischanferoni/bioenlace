intent_id: turnos.ver-turnos-anteriores-como-paciente
version: 1

action_name: "Ver turnos anteriores"
description: "Consultar un listado corto de tus turnos ya realizados o vencidos."
rbac_route: "/api/turnos/listar-como-paciente"
keywords:
  - turnos anteriores
  - historial de turnos
  - turnos pasados
  - turnos que tuve
  - mis turnos pasados
  - citas anteriores
  - citas pasadas
  - ver turnos anteriores
  - listar turnos anteriores

intent_semantics:
  summary: >-
    Consultá un resumen corto de tus turnos anteriores (fecha, servicio y profesional).
  capabilities:
    - ver_turnos_propios
  goal: >-
    Mostrar al paciente un historial acotado de turnos pasados sin cancelar ni reprogramar.
  how: >-
    Resume en el chat y, si el cliente lo permite, abre el listado de turnos anteriores.
  outcome:
    - El paciente ve fecha, servicio y profesional de turnos ya realizados o vencidos (lista corta).

draft_hydrator:
  handler: scheduling.turnos_listar_como_paciente
  alcance: pasados
  limit: 5

subintents:
  - id: ver_listado
    assistant_text: "Tus turnos anteriores"
    provides: []
    next: ""
    open_ui:
      action_id: turnos.listar-como-paciente
      params:
        alcance: pasados
        limit: "5"
