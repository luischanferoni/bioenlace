intent_id: turnos.crear-como-paciente
version: 3

action_name: "Reservar turno"
description: "Elegir servicio, centro de salud, profesional y horario (sin repreguntar motivo clínico)."
rbac_route: "/api/turnos/crear-como-paciente"
keywords:
  - turno
  - sacar turno
  - reservar turno
  - pedir turno
  - autogestión
  - agendar cita

intent_semantics:
  goal: >-
    Reservar un turno de atención seleccionando servicio, centro de salud, profesional y un horario disponible.
  how: >-
    Servicio → centro → profesional → día con cupos → horario; al tener slot, confirmación.
  preconditions:
    - El usuario puede autogestionar turnos.
    - Existe disponibilidad (slots) para el servicio/centro/profesional elegidos.
  constraints:
    - Para ver días/horarios debe existir un profesional y un centro seleccionados.
    - La opción “cercano” requiere geolocalización del cliente.
  outcome:
    - Turno creado/confirmado para el slot seleccionado.
  keyphrases:
    - reservar una cita
    - sacar turno en un centro de salud
    - elegir servicio y horario disponible

draft_keys_extra:
  - tipo_atencion
  - fecha_turno

subintents:
  - id: select_servicio
    assistant_text: "Servicio"
    provides:
      - draft.id_servicio_asignado
    next: select_efector
    hint:
      entity: servicio
      match_property: nombre
    open_ui:
      action_id: servicios.elegir-acepta-turnos

  - id: select_efector
    assistant_text: "Centro de salud"
    requires:
      - draft.id_servicio_asignado
    provides:
      - draft.id_efector
    next: select_profesional
    hint:
      entity: efector
      match_property: nombre
    chooser:
      when_user_says_nearby:
        open_ui:
          action_id: efectores.listar-por-servicio-cercano
          params:
            id_servicio: "draft.id_servicio_asignado"
      otherwise:
        open_ui:
          action_id: efectores.listar-por-servicio
          params:
            id_servicio: "draft.id_servicio_asignado"

  - id: select_profesional
    assistant_text: "Profesional"
    requires:
      - draft.id_efector
      - draft.id_servicio_asignado
    provides:
      - draft.id_profesional_efector_servicio
    next: select_dia
    hint:
      entity: profesional
      match_property: nombre
    open_ui:
      action_id: profesional-efector-servicio.listar-por-efector-servicio-acepta-turnos
      params:
        id_efector: "draft.id_efector"
        id_servicio: "draft.id_servicio_asignado"

  - id: select_dia
    assistant_text: "Día"
    requires:
      - draft.id_profesional_efector_servicio
    provides:
      - draft.fecha_turno
    next: select_slot
    open_ui:
      action_id: turnos.slots-dias-disponibles-como-paciente
      params:
        id_servicio: "draft.id_servicio_asignado"
        id_efector: "draft.id_efector"
        id_profesional_efector_servicio: "draft.id_profesional_efector_servicio"

  - id: select_slot
    assistant_text: "Horario"
    requires:
      - draft.id_profesional_efector_servicio
      - draft.fecha_turno
    provides:
      - draft.slot_id
    next: ""
    open_ui:
      action_id: turnos.slots-disponibles-como-paciente
      params:
        id_servicio: "draft.id_servicio_asignado"
        id_efector: "draft.id_efector"
        id_profesional_efector_servicio: "draft.id_profesional_efector_servicio"
        fecha: "draft.fecha_turno"

flow_submit:
  action_id: turnos.crear-como-paciente
  params:
    slot_id: "draft.slot_id"
    id_servicio_asignado: "draft.id_servicio_asignado"
    id_efector: "draft.id_efector"
    tipo_atencion: "draft.tipo_atencion"
