intent_id: turnos.crear-como-paciente
version: 1

action_name: "Reservar turno"
description: "Flujo conversacional para autogestión de turno: servicio, centro de salud, profesional, horario y tipo de atención."
rbac_route: "/api/turnos/crear-como-paciente"
keywords:
  - turno
  - sacar turno
  - reservar turno
  - pedir turno
  - autogestión

# Claves opcionales del draft usadas por clientes sin aparecer en requires/provides del YAML.
draft_keys_extra:
  - tipo_atencion

prompt_context:
  # Esto define qué se adjunta al prompt del LLM (cuando se use IA).
  include:
    - intent_id
    - current_subintent_id
    - allowed_open_ui_action_ids
    - required_draft_fields
    - draft_summary
    - last_user_message

subintents:
  - id: select_servicio
    assistant_text: "Servicio"
    provides:
      - draft.id_servicio_asignado
    next: select_efector
    open_ui:
      action_id: servicios.elegir

  - id: select_efector
    assistant_text: "Centro de salud"
    requires:
      - draft.id_servicio_asignado
    provides:
      - draft.id_efector
    next: select_rrhh
    chooser:
      when_user_says_nearby:
        # si el usuario pide "cerca" el motor usará esquema global de ubicación.
        uses_global: location_acquisition.v1
        open_ui:
          action_id: efectores.listar-por-servicio-cercano
          params:
            id_servicio: "draft.id_servicio_asignado"
      otherwise:
        open_ui:
          action_id: efectores.listar-por-servicio
          params:
            id_servicio: "draft.id_servicio_asignado"

  - id: select_rrhh
    assistant_text: "Profesional"
    requires:
      - draft.id_efector
      - draft.id_servicio_asignado
    provides:
      - draft.id_rr_hh
    next: select_slot
    open_ui:
      action_id: rrhh.listar-por-efector-servicio-acepta-turnos
      params:
        id_efector: "draft.id_efector"
        id_servicio: "draft.id_servicio_asignado"

  - id: select_slot
    assistant_text: "Horario"
    requires:
      - draft.id_rr_hh
    provides:
      - draft.slot_id
    next: confirm
    open_ui:
      action_id: turnos.slots-disponibles-como-paciente
      params:
        id_servicio: "draft.id_servicio_asignado"
        id_efector: "draft.id_efector"
        id_rr_hh: "draft.id_rr_hh"

  - id: confirm
    assistant_text: "Confirmación"
    requires:
      - draft.slot_id
    submit:
      action_id: turnos.crear-como-paciente
