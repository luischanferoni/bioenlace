# Política de chat para consultas clínicas async (SOLICITUD_ASYNC).
version: "1"

conversation_modes:
  structured:
    medicacion_operaciones:
      - renovacion
      - ajuste
    patient_composer: false
    patient_upload: false
    # Sin chat libre: el staff resuelve con CTAs (aceptar / no corresponde / control).
    staff_composer: false
    composer_hint: >-
      Tu solicitud ya fue registrada. Esperá la resolución del profesional; no hace falta
      enviar más mensajes.
    staff_composer_hint: >-
      Resolvé la solicitud con una de las opciones. En renovación o ajuste no hay chat libre.
  conversational:
    patient_composer: true
    patient_upload: true
    staff_composer: true

attachments:
  # Staff (compositor habilitado).
  allowed_message_types:
    - audio
    - documento
  # Paciente en modo conversacional: solo imágenes (no PDF ni audio).
  patient_allowed_message_types:
    - imagen
  image:
    extensions:
      - jpg
      - jpeg
      - png
      - webp
      - heic
    mime_types:
      - image/jpeg
      - image/png
      - image/webp
      - image/heic
    max_bytes: 5242880
  document:
    extensions:
      - pdf
    mime_types:
      - application/pdf
    max_bytes: 10485760
  audio:
    extensions:
      - m4a
      - mp3
      - webm
      - ogg
      - wav
    mime_types:
      - audio/webm
      - audio/mp4
      - audio/mpeg
      - audio/ogg
      - audio/wav
    max_bytes: 5242880

limits:
  conversational:
    max_patient_messages_while_planned_without_staff: 3
    max_patient_messages_total: 20
    window_days: 7
    auto_close_resolution: limite_conversacion
  rate_limit:
    window_days: 30
    max_solicitudes_medicacion_por_plan: 2

duplicate:
  block_open_medicacion_por_plan: true
  block_renovacion_si_ajuste_abierto: true
  messages:
    open_renovacion: >-
      Ya tenés una solicitud de renovación pendiente para este tratamiento. Revisala en Inicio
      → Consultas clínicas por mensaje.
    open_ajuste: >-
      Ya tenés una solicitud de ajuste pendiente para este tratamiento. Revisala en Inicio
      → Consultas clínicas por mensaje.
    open_medicacion: >-
      Ya tenés una consulta sobre medicación pendiente para este tratamiento. Esperá la respuesta
      antes de enviar otra.
    renovacion_con_ajuste_pendiente: >-
      Tenés un ajuste de medicación pendiente. Cuando el profesional lo resuelva, podés solicitar
      la renovación de la medicación actualizada.
    rate_limit_medicacion: >-
      Superaste el límite de solicitudes de medicación para este tratamiento en el período indicado.
      Pedí un turno de control si necesitás atención.

cancel:
  allowed_statuses:
    - planned
  require_no_staff_assigned: true
  require_no_staff_message: true
  message_exito: Retiramos tu solicitud. Podés iniciar una nueva consulta cuando lo necesites.

resolutions:
  medicacion_renovada:
    label: Medicación renovada
    notify_patient: true
    permite_renovacion_posterior: false
  medicacion_ajustada:
    label: Medicación ajustada
    notify_patient: true
    permite_renovacion_posterior: true
  medicacion_no_indicada:
    label: No corresponde renovación ni ajuste
    require_note: true
    notify_patient: true
  requiere_control_presencial:
    label: Requiere control presencial
    require_note: false
    notify_patient: true
    suggest_turno: true
  consulta_resuelta:
    label: Consulta resuelta por mensaje
    notify_patient: true
  limite_conversacion:
    label: Límite de mensajes alcanzado
    notify_patient: true
    suggest_turno: true
  cancelada_paciente:
    label: Cancelada por el paciente
    notify_patient: false

# Categorías canónicas de solicitud async (sistema completo).
# message_type_legacy: valores históricos en interaccion_chat_clinico.message_type (migración).
solicitud_categorias:
  renovacion_medicacion:
    label: Solicitud de renovación de medicación
    message_type_legacy: solicitud_renovacion
  ajuste_medicacion:
    label: Solicitud de ajuste de medicación
    message_type_legacy: solicitud_ajuste
  consulta_evolucion:
    label: Consulta o evolución
    message_type_legacy: solicitud_consulta

# Alias de flujo/meta (medicacion_operacion, seguimiento_necesidad, intake_tipo) → categoría.
solicitud_categoria_aliases:
  renovacion: renovacion_medicacion
  renovacion_medicacion: renovacion_medicacion
  ajuste: ajuste_medicacion
  ajuste_medicacion: ajuste_medicacion
  renovar_medicacion: renovacion_medicacion
  solicitar_ajuste: ajuste_medicacion
  contar_evolucion: consulta_evolucion
  duda: consulta_evolucion
  consulta_general: consulta_evolucion
  consulta_evolucion: consulta_evolucion
  seguimiento: consulta_evolucion
  seguimiento_consulta_previa: consulta_evolucion
  default: consulta_evolucion

# Compat: map op → message_type legacy (solo lectura / backfill).
solicitud_message_types:
  renovacion: solicitud_renovacion
  ajuste: solicitud_ajuste
  default: solicitud_consulta

system_messages:
  solicitud_tomada: >-
    Un profesional tomó tu solicitud y te responderá por este chat.
  solicitud_tomada_structured: >-
    Un profesional está revisando tu solicitud y la resolverá en breve.
  solicitud_cerrada: "Cerramos esta consulta: {resolution_label}.{note_suffix}"
  solicitud_cancelada: Retiraste esta solicitud. Podés iniciar una nueva consulta cuando lo necesites.
  limite_conversacion: >-
    Alcanzaste el límite de mensajes para esta consulta. Cerramos el chat; si necesitás seguir,
    solicitá un turno presencial o de control.
  limite_conversacion_turno: Podés reservar un turno desde el asistente o la sección Turnos.

staff_messages:
  tomada_conversational: Solicitud asignada. Podés responder por mensaje.
  tomada_structured: Solicitud asignada. Elegí una resolución para el paciente.

# Labels cortos históricos eliminados: usar solicitud_categorias.*.label vía catalog.
