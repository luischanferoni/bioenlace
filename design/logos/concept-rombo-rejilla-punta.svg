<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!-- Bioenlace: rhombus with minimal inner grid; top axis in #ff6b6b ends at circle on tip. -->
<svg
   width="128mm"
   height="128mm"
   viewBox="0 0 512 512"
   version="1.1"
   id="svg-root"
   inkscape:version="1.4"
   sodipodi:docname="concept-rombo-rejilla-punta.svg"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg">
  <sodipodi:namedview
     id="namedview"
     pagecolor="#ffffff"
     bordercolor="#666666"
     borderopacity="1"
     inkscape:pageshadow="2"
     inkscape:pageopacity="0"
     inkscape:pagecheckerboard="false"
     inkscape:deskcolor="#d1d1d1"
     inkscape:document-units="mm"
     inkscape:zoom="1.6"
     inkscape:cx="256"
     inkscape:cy="256"
     inkscape:window-maximized="1"
     inkscape:current-layer="layer-marca" />
  <title>Bioenlace rhomb grid tip node</title>
  <desc>Rhombus; inner grid = horizontal chord plus vertical diameter; upper half #ff6b6b to circle at top vertex.</desc>
  <defs id="defs">
    <style type="text/css"><![CDATA[
      .rombo { fill: none; stroke: #093e4d; stroke-width: 10; stroke-linejoin: round; stroke-linecap: round; }
      .rejilla { fill: none; stroke: #38be7f; stroke-width: 5; stroke-linecap: round; opacity: 0.85; }
      .eje-teal { fill: none; stroke: #093e4d; stroke-width: 5; stroke-linecap: round; opacity: 0.9; }
      .eje-coral { fill: none; stroke: #ff6b6b; stroke-width: 6; stroke-linecap: round; }
      .nodo-coral { fill: #ff6b6b; stroke: #093e4d; stroke-width: 3; }
    ]]></style>
  </defs>
  <g inkscape:groupmode="layer" inkscape:label="Fondo" id="layer-fondo" sodipodi:insensitive="true">
    <rect width="512" height="512" fill="#ffffff" id="bg" />
  </g>
  <g inkscape:groupmode="layer" inkscape:label="Marca" id="layer-marca">
    <g id="marca" inkscape:label="Rombo rejilla punta">
      <!-- Top (256,96), Right (416,256), Bottom (256,416), Left (96,256) -->
      <path
         id="rombo"
         class="rombo"
         d="M 256 96 L 416 256 L 256 416 L 96 256 Z" />
      <!-- Rejilla minima: solo cruz por el centro (2 lineas) -->
      <path id="cuerda-h" class="rejilla" d="M 96 256 L 416 256" />
      <path id="cuerda-v-inf" class="eje-teal" d="M 256 256 L 256 416" />
      <!-- Punta superior: eje coral del centro hasta el borde inferior del circulo (r=16, cy=96 => y=112) -->
      <path id="cuerda-v-sup-coral" class="eje-coral" d="M 256 256 L 256 112" />
      <circle id="nodo-punta" class="nodo-coral" cx="256" cy="96" r="16" />
    </g>
  </g>
</svg>
