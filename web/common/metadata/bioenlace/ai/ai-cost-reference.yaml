# Referencia de costos IA (alineado con web/docs/costos/costos-api.md).
# Usado por AICostEstimationService para estimar USD cuando no hay usageMetadata real.

modelo: gemini-2.5-flash-lite

tarifas_usd_por_millon:
  input: 0.10
  input_cacheado: 0.01
  output: 0.40

# Comparativa alternativa (no producción). Ver costos-api.md § DeepSeek.
comparativa:
  modelo: deepseek-v4-flash
  tarifas_usd_por_millon:
    input: 0.14
    input_cacheado: 0.0028
    output: 0.28
  fuente: https://api-docs.deepseek.com/quick_start/pricing

# Tokens de referencia por llamada cuando la ejecución es simulada (sin HTTP).
llamada_referencia:
  prompt_tokens: 1000
  candidates_tokens: 500
  cached_ratio: 0.25

# Overrides por contexto IAManager (web/docs/costos/costos-api.md § Contextos).
# volumen_mensual_por_profesional: null = no sumado al Apartado 1 (ver nota en doc).
contextos:
  asistente-preprocess:
    prompt_tokens: 700
    candidates_tokens: 250
    cached_ratio: 0.40
    volumen_mensual_por_profesional: 2000
  asistente-conversational:
    prompt_tokens: 930
    candidates_tokens: 180
    cached_ratio: 0.40
    volumen_mensual_por_profesional: 660
  asistente-onboarding:
    # §3 costos-api: sin contexto dedicado en código; reutiliza preprocess/conversacional.
