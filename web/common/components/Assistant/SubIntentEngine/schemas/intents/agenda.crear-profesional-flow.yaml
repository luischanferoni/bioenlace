intent_id: agenda.crear-profesional-flow
version: 1

action_name: "Alta profesional en efector y agenda"
description: "Agregar un profesional a un servicio y, si corresponde, crear su agenda."
rbac_route: "/api/profesional-agenda/crear-agenda-flow"
keywords:
  - agenda
  - cargar agenda
  - cargar la agenda
  - agregar profesional
  - agenda médico
  - agenda medico
  - horarios médico
  - horarios medico

intent_semantics:
  goal: >-
    Dar de alta la asignación de una persona a un servicio del efector (persona + efector + servicio)
    y, si el servicio admite turnos, abrir la configuración de una agenda nueva.
  how: >-
    Buscar persona en el padrón, elegir un servicio del establecimiento (efector en sesión).
    Al completar ese paso se persiste el vínculo persona–efector–servicio; si el servicio acepta turnos sigue la pantalla de configuración de agenda (donde se guardan horarios/cupo) y luego el cierre declarativo del flujo (`flow_submit`), si no, el cierre ocurre al terminar la selección de servicio.
  preconditions:
    - Efector operativo en sesión.
    - Permisos para dar de alta asignaciones en el efector.
  constraints:
    - La búsqueda de persona en padrón usa texto; el listado de servicios del efector se carga completo (filtro opcional por nombre vía `q` en la API).
    - Agenda solo si servicios.acepta_turnos = SI.
  outcome:
    - Asignación persona–efector–servicio persistida.
    - Agenda configurada cuando el servicio acepta turnos.
  keyphrases:
    - alta de profesional en efector y servicio
    - asociar persona a servicio del efector
    - configurar disponibilidad si el servicio tiene turnos

draft_keys_extra:
  - servicio_acepta_turnos
  - id_persona
  - agenda_ui_completed

business_rules:
  - id: agenda_alta_vs_solo_horarios
    when: pre_flow
    checker: content_regex
    require_any:
      - "(cargar|configurar|editar|modificar|actualizar).*(agenda|horario)"
      - "m[eé]dico|profesional|doctor"
    forbid_any:
      - "crear|agregar|nuevo|alta|asociar|recurso humano"
    user_message: >-
      Parece que querés trabajar con agenda u horarios de un profesional.
      ¿Necesitás el flujo completo (asociar profesional y servicio) o solo cargar horarios porque ya tiene el servicio con turnos?
    remediation:
      - id: flujo_completo
        label: "Flujo completo (profesional / servicio / agenda si aplica)"
        intent_id: agenda.crear-profesional-flow
        reset_flow: true
      - id: solo_agenda
        label: "Solo horarios (ya tiene servicio que acepta turnos)"
        intent_id: agenda.editar-agenda-flow
        reset_flow: true
      - id: mi_agenda
        label: "Mi agenda (mis servicios)"
        intent_id: agenda.editar-mi-agenda-flow
        reset_flow: true

subintents:
  - id: select_persona
    assistant_text: "Persona"
    provides:
      - draft.id_persona
    next: select_servicio
    # SPA (`spa-home.js`): si la URL de la mini-UI devuelve HTTP≠200, JSON sin `kind: ui_definition` o `success: false`,
    # no se muestra la tira de pasos como si el flujo hubiera avanzado (no “saltamos” visualmente a los siguientes pasos).
    open_ui:
      action_id: persona.buscar-para-asistente
      pass_content_as_query: q

  - id: select_servicio
    assistant_text: "Servicio"
    # La mini-UI solo usa efector en sesión; `id_persona` sigue viniendo del paso anterior por orden del flujo.
    provides:
      - draft.id_servicio
    next_routing:
      - when:
          draft_equals:
            servicio_acepta_turnos: "SI"
        next: configurar_agenda
      - when:
          default: true
        next: ""
    open_ui:
      # Misma regla SPA que en `select_persona`: error de carga de UI → no tira de plan / pasos siguientes.
      # Catálogo del establecimiento (`ServiciosEfector`), no RRHH. `q` opcional en la API para filtrar por nombre.
      action_id: efectores.listar-servicios-habilitados

  - id: configurar_agenda
    assistant_text: "Agenda"
    provides:
      - draft.agenda_ui_completed
    requires:
      - draft.id_profesional_efector_servicio
      - draft.id_servicio
    next: ""
    open_ui:
      # Misma regla SPA al abrir la configuración de agenda.
      action_id: profesional-agenda.configurar-agenda
      params:
        id_profesional_efector_servicio: "draft.id_profesional_efector_servicio"
        id_servicio: "draft.id_servicio"

# Cierre POST-only (sin GET UI); rbac_route = permiso /api/profesional-agenda/crear-agenda-flow
flow_submit:
  action_id: profesional-agenda.crear-agenda-flow
  params:
    id_profesional_efector_servicio: "draft.id_profesional_efector_servicio"
    id_servicio: "draft.id_servicio"
    id_persona: "draft.id_persona"
