intent_id: licencia.cargar-para-profesional-flow
version: 1

operation: create
intent_family: licencia.cargar
domain_operation: ProfesionalEfectorServicio.condicion_laboral_staff

subject_resolution:
  handler: organization.pes_staff_in_efector

fields:
  - name: id_servicio
  - name: fecha_inicio
  - name: fecha_fin
  - name: ui_step
  - name: confirmar_impacto_turnos

action_name: "Licencia de un profesional"
description: "Para registrar licencia o permiso de un profesional del efector."
rbac_route: "/api/profesional-efector-servicio/cargar-licencia-para-profesional-flow"
keywords:
  - licencia profesional
  - cargar licencia
  - registrar licencia
  - licencia médico
  - permiso profesional
  - vacaciones médico
  - ausencia profesional

intent_semantics:
  goal: >-
    Registrar licencia, permiso o ausencia (solo fechas) de un profesional del efector (staff / RRHH).
  how: >-
    Seleccionás profesional y servicio; completás fechas en el formulario; el cierre confirma el flujo.
  preconditions:
    - Efector operativo en sesión.
    - Profesional y servicio seleccionables en el efector.
    - Condición laboral contractual ya registrada en el servicio.
  outcome:
    - Vigencia de licencia actualizada para la asignación PES elegida.

draft_keys_extra:
  - condicion_laboral_ui_completed

draft_hydrator:
  handler: organization.pes_from_servicio

subintents:
  - id: select_profesional
    assistant_text: "Profesional"
    provides:
      - draft.id_profesional_efector_servicio
    next: select_servicio
    open_ui:
      action_id: profesional-efector-servicio.listar-por-efector

  - id: select_servicio
    assistant_text: "Servicio"
    requires:
      - draft.id_profesional_efector_servicio
    provides:
      - draft.id_servicio
    next: cargar_licencia
    open_ui:
      action_id: profesional-efector-servicio.listar-servicios-en-efector
      params:
        id_profesional_efector_servicio: "draft.id_profesional_efector_servicio"

  - id: cargar_licencia
    assistant_text: "Licencia"
    provides:
      - draft.condicion_laboral_ui_completed
      - draft.fecha_inicio
      - draft.fecha_fin
    requires:
      - draft.id_profesional_efector_servicio
      - draft.id_servicio
    next: ""
    open_ui:
      action_id: profesional-efector-servicio.cargar-licencia-para-profesional
      params:
        id_profesional_efector_servicio: "draft.id_profesional_efector_servicio"
        id_servicio: "draft.id_servicio"

flow_submit:
  action_id: profesional-efector-servicio.cargar-licencia-para-profesional-flow
  params:
    id_profesional_efector_servicio: "draft.id_profesional_efector_servicio"
    id_servicio: "draft.id_servicio"
    fecha_inicio: "draft.fecha_inicio"
    fecha_fin: "draft.fecha_fin"
