<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!-- Bioenlace concept 6a: concentric rings and center dot. -->
<svg
   width="128mm"
   height="128mm"
   viewBox="0 0 512 512"
   version="1.1"
   id="svg-root"
   inkscape:version="1.4"
   sodipodi:docname="concept-6a-ondas-concentricas.svg"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg">
  <sodipodi:namedview
     id="namedview"
     pagecolor="#ffffff"
     bordercolor="#666666"
     borderopacity="1"
     inkscape:pageshadow="2"
     inkscape:pageopacity="0"
     inkscape:pagecheckerboard="false"
     inkscape:deskcolor="#d1d1d1"
     inkscape:document-units="mm"
     inkscape:zoom="1.4"
     inkscape:cx="256"
     inkscape:cy="256"
     inkscape:window-maximized="1"
     inkscape:current-layer="layer-marca" />
  <title>Bioenlace 6a concentric waves</title>
  <defs id="defs">
    <style type="text/css"><![CDATA[
      .onda-1 { fill: none; stroke: #093e4d; stroke-width: 10; opacity: 0.35; }
      .onda-2 { fill: none; stroke: #093e4d; stroke-width: 12; opacity: 0.55; }
      .onda-3 { fill: none; stroke: #38be7f; stroke-width: 14; opacity: 0.75; }
      .onda-4 { fill: none; stroke: #093e4d; stroke-width: 16; opacity: 0.9; }
      .punto { fill: #ff6b6b; stroke: #093e4d; stroke-width: 4; }
    ]]></style>
  </defs>
  <g inkscape:groupmode="layer" inkscape:label="Fondo" id="layer-fondo" sodipodi:insensitive="true">
    <rect width="512" height="512" fill="#ffffff" id="bg" />
  </g>
  <g inkscape:groupmode="layer" inkscape:label="Marca" id="layer-marca">
    <g id="marca" inkscape:label="Waves plus dot">
      <circle id="c4" class="onda-1" cx="256" cy="256" r="200" />
      <circle id="c3" class="onda-2" cx="256" cy="256" r="152" />
      <circle id="c2" class="onda-3" cx="256" cy="256" r="104" />
      <circle id="c1" class="onda-4" cx="256" cy="256" r="56" />
      <circle id="punto" class="punto" cx="256" cy="256" r="22" />
    </g>
  </g>
</svg>
