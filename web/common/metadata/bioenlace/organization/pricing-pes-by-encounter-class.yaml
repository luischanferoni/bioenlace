# Precio orientativo por profesional × encounter_class (USD / mes, sin IVA).
# Fórmula: precio_clase = COGS_ref × (vol_clase/ref) × (1 + margin_on_cost_percent/100)
# COGS: web/docs/costos/costos-api.md (sin context caching; Gemini + Groq; Twilio §6).
# Actualizar también institucional/js/pricing-config.json al cambiar cifras.
version: 2
currency: USD
billing_period: month
tax_note: No incluye IVA ni IIBB.

default_when_empty: allow_all

# Volumen de referencia costos-api (AMB): 400 encounters/prof/mes.
reference_encounters_per_professional_month: 400

# COGS variable por profesional/mes a volumen reference (400).
# base = Apartado 1 motivos texto SIN STT del profesional (~1,24 − 0,28).
# audio = STT Groq del dictado del profesional (§4).
# videollamada = Twilio Video §6 (solo AMB si se elige).
cogs_usd_per_professional_month:
  base: 0.96
  audio: 0.28
  videollamada: 11.52

margin_on_cost_percent: 233

cogs_source: web/docs/costos/costos-api.md — COGS base sin context caching

# Política de capacidades:
# - AMB: dictado y videollamada opcionales (elegibles en calculador).
# - EMER / IMP: dictado obligatorio (audio_included); videollamada no disponible.
addons:
  audio:
    label: Dictado
    description: Transcripción del audio que envía el profesional en la captura clínica
    default: false
  videollamada:
    label: Videollamada
    description: Teleconsulta paciente–profesional (referencia Twilio)
    default: false

sellable_classes:
  AMB:
    label: Ambulatorio
    short: Consultorios y turnos
    encounters_per_professional_month: 400
    audio_included: false
    videollamada_allowed: true
    includes:
      - Agenda de cupos y reserva paciente
      - Captura clínica AMB
      - App paciente (turnos)
    product_gates:
      - session_encounter_class
      - amb_agenda
      - patient_booking
  EMER:
    label: Urgencia / guardia
    short: Tablero y plantel de guardia
    encounters_per_professional_month: 350
    audio_included: true
    videollamada_allowed: false
    includes:
      - Cobertura / roster EMER
      - Tablero de guardia
      - Captura clínica EMER (dictado incluido)
    product_gates:
      - session_encounter_class
      - emer_cobertura
      - emer_tablero
  IMP:
    label: Internación
    short: Piso, camas y evoluciones
    encounters_per_professional_month: 300
    audio_included: true
    videollamada_allowed: false
    includes:
      - Cobertura / roster IMP
      - Mapa de camas
      - Captura / evoluciones (dictado incluido)
    product_gates:
      - session_encounter_class
      - imp_cobertura
      - imp_mapa

non_sellable_default: disabled

simulator:
  title: Calculá tu licencia
  subtitle: Elegí tipos de atención y profesionales. En ambulatorio podés sumar dictado y/o videollamada. En urgencia e internación el dictado va incluido y no hay videollamada.
  cta_label: Pedir cotización
  cta_href: "#contacto"
  footnotes:
    - Volúmenes de referencia por profesional/mes (época normal): ambulatorio 400, urgencia 350, internación 300.
    - Dictado: opcional en ambulatorio; obligatorio en urgencia e internación. Videollamada: solo ambulatorio.
    - Lo no contratado no aparece en la sesión operativa ni en tableros de esa clase.
