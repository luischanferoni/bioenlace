<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!-- Bioenlace: concepto 7a - dos circulos que se cruzan (vesica / enlace). -->
<svg
   width="128mm"
   height="128mm"
   viewBox="0 0 512 512"
   version="1.1"
   id="svg-root"
   inkscape:version="1.4"
   sodipodi:docname="concept-7a-vesica-enlace.svg"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg">
  <sodipodi:namedview
     id="namedview"
     pagecolor="#ffffff"
     bordercolor="#666666"
     borderopacity="1"
     inkscape:pageshadow="2"
     inkscape:pageopacity="0"
     inkscape:pagecheckerboard="false"
     inkscape:deskcolor="#d1d1d1"
     inkscape:document-units="mm"
     inkscape:zoom="1.4"
     inkscape:cx="256"
     inkscape:cy="256"
     inkscape:window-maximized="1"
     inkscape:current-layer="layer-marca" />
  <title>Bioenlace - 7a vesica</title>
  <desc>Dos circulos superpuestos; el traslape sugiere vinculo. La elipse central aproxima la lente (reemplazar por interseccion booleana si queres precision).</desc>
  <defs id="defs">
    <style type="text/css"><![CDATA[
      .circulo { fill: #38be7f; fill-opacity: 0.42; stroke: #093e4d; stroke-width: 10; }
      .lente { fill: #ff6b6b; fill-opacity: 0.5; stroke: none; }
    ]]></style>
  </defs>
  <g inkscape:groupmode="layer" inkscape:label="Fondo" id="layer-fondo" sodipodi:insensitive="true">
    <rect width="512" height="512" fill="#ffffff" id="bg" />
  </g>
  <g inkscape:groupmode="layer" inkscape:label="Marca" id="layer-marca">
    <g id="marca" inkscape:label="Vesica">
      <circle id="circulo-izq" class="circulo" cx="198" cy="256" r="118" />
      <circle id="circulo-der" class="circulo" cx="314" cy="256" r="118" />
      <ellipse id="lente" class="lente" cx="256" cy="256" rx="54" ry="104" />
    </g>
  </g>
</svg>
