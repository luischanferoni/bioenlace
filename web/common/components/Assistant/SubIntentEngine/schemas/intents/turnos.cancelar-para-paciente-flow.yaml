intent_id: turnos.cancelar-para-paciente-flow
version: 1

action_name: "Cancelar turno (gestión)"
description: "Staff: cancelación operativa de un turno por id (motivo médico/efector)."
rbac_route: "/api/turnos/cancelar-operativo"
keywords:
  - cancelar turno paciente
  - baja operativa turno
  - anular cita gestión

intent_semantics:
  goal: >-
    Cancelar un turno en el efector actual (gestión, no autogestión del paciente).
  how: >-
    Pantalla cancelar-operativo con id del turno y motivo opcional.
  outcome:
    - Turno cancelado con estado_motivo de efector/profesional.

subintents:
  - id: cancelar
    assistant_text: "Turno a cancelar"
    provides:
      - draft.id
      - draft.estado_motivo
      - draft.canal
    next: ""
    open_ui:
      action_id: turnos.cancelar-operativo

flow_submit:
  action_id: turnos.cancelar-operativo
  params:
    id: "draft.id"
    estado_motivo: "draft.estado_motivo"
    canal: "draft.canal"
