version: 1
# Reglas de oferta y visibilidad según contexto paciente (sector + provincia).
# {@see PacienteContextoOfferingMetadata}

requires_operative_context:
  intent_ids:
    - turnos.crear-como-paciente
    - turnos.cancelar-como-paciente-flow
    - turnos.modificar-como-paciente-flow
    - atencion.necesito-atencion
    - laboratorio.ver-resultados-como-paciente
    - receta.ver-recetas-como-paciente
    - atencion.mis-atenciones-como-paciente
    - atencion.ver-ultima-como-paciente
    - plataforma.enviar-queja-como-paciente-flow
    - paciente-contexto.recurso-provincial-como-paciente-flow

sector_salud:
  PUBLICO:
    origen_financiamiento_include:
      - Nacional
      - Provincial
      - Municipal
      - Público
      - Publico
    origen_financiamiento_exclude:
      - Privado
  PRIVADO:
    origen_financiamiento_include:
      - Privado
    origen_financiamiento_exclude: []

intents_by_sector:
  PUBLICO:
    deny_intent_ids: []
  PRIVADO:
    deny_intent_ids: []

home_panel_sections:
  patient:
    requires_operative_context:
      - upcoming_appointments
      - patient_async_consultations
