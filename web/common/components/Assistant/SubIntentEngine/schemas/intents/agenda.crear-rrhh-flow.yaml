intent_id: agenda.crear-rrhh-flow
version: 1

action_name: "Crear recurso humano"
rbac_route: "/api/profesional-agenda/crear-agenda-flow"
keywords:
  - agenda
  - cargar agenda
  - cargar la agenda
  - crear recurso humano
  - agregar recurso humano
  - agregar profesional
  - agenda médico
  - agenda medico
  - horarios médico
  - horarios medico

intent_semantics:
  goal: >-
    Dar de alta la asignación de una persona a un servicio del efector (persona + efector + servicio)
    y, si el servicio admite turnos, abrir la configuración de una agenda nueva.
  how: >-
    Buscar persona en el padrón, elegir un servicio habilitado para el efector en sesión;
    el sistema persiste la asignación profesional–efector–servicio (PES) y vínculos legacy si aplican; solo si acepta_turnos es SI se continúa a la UI de agenda.
  preconditions:
    - Efector operativo en sesión.
    - Permisos para dar de alta asignaciones en el efector.
  constraints:
    - Sin texto de búsqueda no se listan personas ni servicios (solo cuadro de filtro).
    - Agenda solo si servicios.acepta_turnos = SI.
  outcome:
    - Asignación persona–efector–servicio persistida.
    - Agenda configurada cuando el servicio acepta turnos.
  keyphrases:
    - alta de profesional en efector y servicio
    - asociar persona a servicio del efector
    - configurar disponibilidad si el servicio tiene turnos

draft_keys_extra:
  - servicio_acepta_turnos
  - id_persona

business_rules:
  - id: agenda_alta_vs_solo_horarios
    when: pre_flow
    checker: content_regex
    require_any:
      - "(cargar|configurar|editar|modificar|actualizar).*(agenda|horario)"
      - "m[eé]dico|profesional|doctor"
    forbid_any:
      - "crear|agregar|nuevo|alta|asociar|recurso humano|rrhh"
    user_message: >-
      Parece que querés trabajar con agenda u horarios de un profesional.
      ¿Necesitás el flujo completo (asociar profesional y servicio) o solo cargar horarios porque ya tiene el servicio con turnos?
    remediation:
      - id: flujo_completo
        label: "Flujo completo (profesional / servicio / agenda si aplica)"
        intent_id: agenda.crear-rrhh-flow
        reset_flow: true
      - id: solo_agenda
        label: "Solo horarios (ya tiene servicio que acepta turnos)"
        intent_id: agenda.editar-agenda-flow
        reset_flow: true

subintents:
  - id: select_persona
    assistant_text: "Persona"
    provides:
      - draft.id_persona
    next: select_servicio
    open_ui:
      action_id: persona.buscar-para-asistente
      pass_content_as_query: q

  - id: select_servicio
    assistant_text: "Servicio"
    requires:
      - draft.id_persona
    provides:
      - draft.id_servicio
    next_routing:
      - when:
          draft_equals:
            servicio_acepta_turnos: "SI"
        next: configurar_agenda
      - when:
          default: true
        next: asignacion_sin_agenda_listo
    open_ui:
      action_id: recurso-humano.listar-servicios-habilitados-efector
      pass_content_as_query: q

  - id: configurar_agenda
    assistant_text: "Agenda"
    requires:
      - draft.id_profesional_efector_servicio
      - draft.id_servicio
    next: ""
    open_ui:
      action_id: profesional-agenda.configurar-agenda
      params:
        id_profesional_efector_servicio: "draft.id_profesional_efector_servicio"
        id_servicio: "draft.id_servicio"

  - id: asignacion_sin_agenda_listo
    assistant_text: "Listo. La persona quedó asignada al servicio; este servicio no usa agenda de turnos."
    requires:
      - draft.id_profesional_efector_servicio
    next: ""
