# Preguntas estructuradas opcionales antes del chat de motivos.
# {@see EncounterMotivosIntakeCatalogService}
version: 1
enabled: false
title: "Antes de contarnos tus motivos"
intro: "Estas respuestas ayudan a orientar tu consulta. Luego podés ampliar en el chat."
notes_for_staff: ""

questions:
  - id: motivo_principal
    label: "¿Cuál es el principal motivo de tu consulta?"
    type: select
    required: true
    options:
      - value: control
        label: Control o chequeo
      - value: sintoma_nuevo
        label: Síntoma o malestar nuevo
      - value: seguimiento
        label: Seguimiento de algo ya conocido
      - value: renovacion
        label: Renovación de tratamiento o estudio
      - value: otro
        label: Otro

  - id: desde_cuando
    label: "¿Desde cuándo lo notás? (opcional)"
    type: text
    required: false

  - id: intensidad
    label: "¿Qué tan molesto es? (1 = leve, 5 = muy intenso)"
    type: select
    required: false
    options:
      - value: "1"
        label: "1 — Leve"
      - value: "2"
        label: "2"
      - value: "3"
        label: "3 — Moderado"
      - value: "4"
        label: "4"
      - value: "5"
        label: "5 — Muy intenso"
