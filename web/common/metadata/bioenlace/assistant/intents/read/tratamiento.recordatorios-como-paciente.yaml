intent_id: tratamiento.recordatorios-como-paciente
version: 1

action_name: "Recordatorios de tratamiento"
description: "Activar recordatorios de tu plan de tratamiento."
rbac_route: "/api/clinical/care-plans/preferencias-recordatorios-como-paciente"
keywords:
  - recordatorios
  - alarmas
  - medicación
  - tomar medicamento
  - recordatorio de estudio
  - horarios de tratamiento

intent_semantics:
  summary: >-
    Activá o ajustá recordatorios locales de medicación y preparación de estudios de tu tratamiento.
  capabilities:
    - recordatorios_tratamiento
  goal: >-
    Configurar recordatorios locales de medicación y preparación de estudios del care plan activo.
  how: >-
    Abre la pantalla de configuración del paciente para activar recordatorios y ajustar horarios.
  outcome:
    - El paciente activa o desactiva alarmas en el dispositivo.

subintents:
  - id: abrir_configuracion
    assistant_text: "Configurá tus recordatorios de tratamiento"
    provides: []
    next: ""
    open_ui:
      action_id: clinical.care-plan.gestionar-recordatorios-como-paciente
