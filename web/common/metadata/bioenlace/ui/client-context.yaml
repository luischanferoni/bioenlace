# Reglas de contexto cliente web vs móvil (Bioenlace / salud).
# {@see ClientContextMetadata} — no hardcodear intents de paciente en Platform.
version: 1

mobile_paciente:
  app_client_ids:
    - paciente-flutter
  shortcuts_catalog: assistant-shortcuts-paciente.yaml
  shortcut_display:
    omit_subgroups: true

# Canal WhatsApp (MVP): mismo rol paciente, catálogo de atajos reducido.
# Impplica contexto no-web ({@see ClientContextService::isWebClient}): no omitir rol paciente ni filtrar flows como-paciente.
whatsapp_paciente:
  app_client_ids:
    - whatsapp-paciente
  shortcuts_catalog: assistant-shortcuts-whatsapp-paciente.yaml
  shortcut_display:
    omit_subgroups: true

web_staff:
  hide_paciente_flows:
    intent_ids:
      - atencion.necesito-atencion
      - personas.designar-representante-flow
      - personas.vincular-menor-flow
    intent_id_contains:
      - como-paciente
      - '-paciente-'
    rbac_route_contains:
      - como-paciente

  hide_notification_tipos:
    - TURNO_REQUIERE_REUBICACION
    - TURNO_CANCELADO_EFECTOR
    - TURNO_RECORDATORIO
