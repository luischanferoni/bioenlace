# Reglas de contexto cliente web vs móvil (Bioenlace / salud).
# {@see ClientContextMetadata} — no hardcodear intents de paciente en Platform.
version: 1

mobile_paciente:
  app_client_ids:
    - paciente-flutter
  shortcuts_catalog: assistant-shortcuts-paciente.yaml
  shortcut_display:
    use_yaml_action_name: true
    omit_subgroups: true

web_staff:
  hide_paciente_flows:
    intent_ids:
      - atencion.necesito-atencion
    intent_id_contains:
      - como-paciente
      - '-paciente-'
    rbac_route_contains:
      - como-paciente

  hide_notification_tipos:
    - TURNO_REQUIERE_REUBICACION
    - TURNO_CANCELADO_EFECTOR
    - TURNO_RECORDATORIO
