version: 1

# Operaciones solo ABAC (sin permiso assignable en auth_item; RBAC vía ruta/intent padre).
domain_only_operations:
  - Encounter.access
  - Clinical.staff_efector
  - Internacion.staff_access
  - ProfesionalEfectorServicio.flow_closure_staff
  - ProfesionalEfectorServicio.flow_closure_own
  - ProfesionalEfectorServicio.condicion_laboral_staff
  - ProfesionalEfectorServicio.condicion_laboral_own
  - ProfesionalEfectorServicio.pes_own

# Políticas de recurso por operación RBAC (Entidad.operacion del catálogo).
# RBAC responde «¿puede intentar?»; aquí «¿sobre ESTE recurso?».
# Modos: policies (AND) | any_of (OR).

operations:
  Turno.cancel:
    any_of:
      - turno.subject_or_representative
      - turno.staff_efector_belongs

  Turno.reprogramar:
    policies:
      - turno.subject_or_representative

  Turno.confirmar_asistencia:
    policies:
      - turno.subject_or_representative

  Turno.view_conflicts:
    policies:
      - turno.subject_or_representative

  Turno.create:
    policies:
      - turno.create_subject_or_representative

  ProfesionalEfectorServicio.create:
    policies:
      - organization.efector_sesion

  ProfesionalEfectorServicio.flow_closure_staff:
    policies:
      - organization.pes_efector

  ProfesionalEfectorServicio.flow_closure_own:
    policies:
      - organization.pes_efector
      - organization.pes_own

  ProfesionalEfectorServicio.condicion_laboral_staff:
    policies:
      - organization.pes_efector

  ProfesionalEfectorServicio.condicion_laboral_own:
    policies:
      - organization.pes_efector
      - organization.pes_own

  ProfesionalEfectorServicio.pes_own:
    policies:
      - organization.pes_efector
      - organization.pes_own

  DataAccess.edit:
    policies:
      - organization.efector_sesion

  DataAccess.info:
    policies:
      - organization.efector_sesion

  DataAccess.list:
    policies:
      - organization.efector_sesion

  Internacion.view_map:
    policies:
      - organization.efector_sesion

  Internacion.create:
    policies:
      - organization.efector_sesion

  Internacion.discharge:
    policies:
      - organization.efector_sesion
      - clinical.internacion_staff_access

  Internacion.change_bed:
    policies:
      - organization.efector_sesion
      - clinical.internacion_staff_access

  Internacion.staff_access:
    policies:
      - clinical.internacion_staff_access

  InternacionEpicrisisPlantilla.admin:
    policies:
      - organization.efector_sesion

  Clinical.staff_efector:
    policies:
      - organization.efector_sesion

  GuardiaEpisode.view_board:
    policies:
      - organization.efector_sesion

  GuardiaEpisode.triage:
    policies:
      - organization.efector_sesion

  ServicioTeleconsultaPolitica.configurar:
    policies:
      - organization.efector_sesion

  Encounter.access:
    policies:
      - clinical.encounter_participant

  Atencion.view_mine:
    policies:
      - clinical.encounter_participant

  Atencion.view_last:
    policies:
      - clinical.encounter_participant
