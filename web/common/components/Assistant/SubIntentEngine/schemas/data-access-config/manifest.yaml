version: 1

# Validación: php yii data-access-catalog/check
# Cada {Entidad}.yaml declara entity, model (+ version_model si aplica), groups y opcionalmente edit_surfaces.
# ui_json_source en un grupo enlaza campos BD ↔ views/json; aspectos open_ui declaran fields[] y ui_flow.

# Sinónimos NL → filtros allowlisted (asistente / preprocess).
filter_synonyms:
  sexo_biologico:
    M: [2, varon, varones, hombre, hombres, masculino]
    F: [1, mujer, mujeres, femenino, femenina]
