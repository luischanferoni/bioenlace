# Bandeja staff y SLA para consultas clínicas por mensaje (consulta async / SOLICITUD_ASYNC).
version: "1"

section:
  title: Consultas clínicas por mensaje
  empty_message: No hay consultas clínicas por mensaje pendientes en tus servicios.

# Horas desde created_at hasta primera respuesta del equipo (por banda de urgencia del triage).
sla_horas_respuesta:
  A: 4
  B: 12
  C: 24
  D: 48
  default: 48

status_labels:
  planned: Pendiente de respuesta
  in-progress: En curso
  on-hold: En espera
  finished: Finalizada
  cancelled: Cancelada

patient_section:
  title: Consultas clínicas por mensaje
  empty_message: No tenés consultas clínicas por mensaje activas.
  history_title: Consultas anteriores
  history_empty_message: No tenés consultas clínicas cerradas recientes.
  history_limit: 20

solicitud:
  mensaje_exito_generico: >-
    Recibimos tu consulta clínica por mensaje. El equipo de salud te responderá cuando pueda.
  mensaje_exito_renovacion: Registramos tu solicitud de renovación de medicación.
  mensaje_exito_renovacion_cierre: >-
    Un profesional la revisará y te responderá por mensaje. Podés ver el estado en Inicio
    → Consultas clínicas por mensaje.
  duplicate_renovacion_abierta: >-
    Ya tenés una solicitud de renovación pendiente para este tratamiento. Revisala en Inicio
    → Consultas clínicas por mensaje antes de enviar otra.

intake_context:
  section_label: Contexto de la solicitud
  reference_encounter_line_label: Atención previa
  reference_encounter_action: Ver atención de referencia
  clinical_history_action: Ver historia clínica
  encounter_detail_title: Atención de referencia
  encounter_detail_empty: No hay un resumen publicado de esa atención.
