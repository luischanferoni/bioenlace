# Hub Control/Seguimiento (Solicitar Atención). Acciones provisionales por condición
# hasta el catálogo PlanDefinition-lite (Fase 3).
version: "1"

hub:
  title: "¿Sobre qué es el control o seguimiento?"
  fallback_general:
    code: general
    label: Pedir un control (turno)
    description: Reservá un turno sin vincularlo a un tratamiento concreto.
  extras:
    - code: consulta_general
      label: Consulta por mensaje
      description: Escribile al equipo sin asociar a un plan.
    - code: consulta_previa
      label: Sobre una atención previa
      description: Consultá por una atención que ya tuviste.

condition_default_actions:
  - code: consulta_mensaje
    label: Consulta por mensaje
    description: Contá tu consulta vinculada a esta condición.
    draft:
      intake_tipo: consulta_general
  - code: solicitar_turno
    label: Pedir turno
    description: Reservá un control presencial o por videollamada.
    draft:
      control_hub_kind: general
