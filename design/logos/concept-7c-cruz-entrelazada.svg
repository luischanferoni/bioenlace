<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!-- Bioenlace concept 7c: two thick ellipses at 90 degrees (woven / knot hint). -->
<svg
   width="128mm"
   height="128mm"
   viewBox="0 0 512 512"
   version="1.1"
   id="svg-root"
   inkscape:version="1.4"
   sodipodi:docname="concept-7c-cruz-entrelazada.svg"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg">
  <sodipodi:namedview
     id="namedview"
     pagecolor="#ffffff"
     bordercolor="#666666"
     borderopacity="1"
     inkscape:pageshadow="2"
     inkscape:pageopacity="0"
     inkscape:pagecheckerboard="false"
     inkscape:deskcolor="#d1d1d1"
     inkscape:document-units="mm"
     inkscape:zoom="1.4"
     inkscape:cx="256"
     inkscape:cy="256"
     inkscape:window-maximized="1"
     inkscape:current-layer="layer-marca" />
  <title>Bioenlace 7c crossed ellipses</title>
  <defs id="defs">
    <style type="text/css"><![CDATA[
      .elipse-a { fill: none; stroke: #093e4d; stroke-width: 44; stroke-linecap: round; }
      .elipse-b { fill: none; stroke: #38be7f; stroke-width: 44; stroke-linecap: round; opacity: 0.95; }
    ]]></style>
  </defs>
  <g inkscape:groupmode="layer" inkscape:label="Fondo" id="layer-fondo" sodipodi:insensitive="true">
    <rect width="512" height="512" fill="#ffffff" id="bg" />
  </g>
  <g inkscape:groupmode="layer" inkscape:label="Marca" id="layer-marca">
    <g id="marca" inkscape:label="Crossed ellipses" transform="translate(256,256)">
      <ellipse id="elipse-h" class="elipse-a" cx="0" cy="0" rx="168" ry="72" transform="rotate(0)" />
      <ellipse id="elipse-v" class="elipse-b" cx="0" cy="0" rx="168" ry="72" transform="rotate(90)" />
    </g>
  </g>
</svg>
