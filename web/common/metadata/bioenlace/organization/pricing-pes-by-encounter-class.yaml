# Precio orientativo por volumen de atenciones × encounter_class (USD / mes, sin IVA).
# Fórmula: precio = atenciones_mes × COGS_por_atención × (1 + margin_on_cost_percent/100)
# El margen baja por tramo según atenciones totales contratadas (suma AMB+EMER+IMP).
# COGS: web/docs/costos/costos-api.md (columna con context caching; Gemini + Groq; video §6).
# Actualizar también institucional/js/pricing-config.json al cambiar cifras.
version: 9
currency: USD
billing_period: month
tax_note: Precios en USD. No incluyen IVA.

default_when_empty: allow_all

# Definición comercial: 1 profesional ≈ 200 atenciones / mes.
# (La referencia histórica de costos-api de 400 = ritmo pleno agresivo; no es la unidad de venta.)
reference_encounters_per_professional_month: 200

# Supuestos de COGS comercial (no = uso 100 % de cada capacidad).
cogs_assumptions:
  patient_chat_messages_budget: 10
  patient_chat_note: Cupo de 10 msgs alrededor del turno para prompts más largos y posibles múltiples llamadas IA; no implica uso pleno en cada mensaje.
  motivos_audio_share: 0.3
  motivos_audio_note: Solo ~30% de atenciones usan audio en motivos (resto texto). No todas las especialidades lo usan igual.

# COGS variable USD por atención (encounter), escenario con context caching.
# patient_chat_amb: §1 con cupo 10 mensajes (capacidad / headroom).
# motivos_audio: blend comercial 30% caso B + 70% caso A ≈ 0,0014.
# captura_ia: §4 sin STT del profesional.
# dictado_stt: STT profesional §4 con −30 % on-device. Incluido en todas las clases.
# videollamada: infra teleconsulta por atención contratada (STT = mismo dictado_stt, una sola vez).
cogs_usd_per_encounter:
  patient_chat_amb: 0.0019
  motivos_audio: 0.0014
  captura_ia: 0.0006
  dictado_stt: 0.0025
  videollamada: 0.0088

# Margen de lista (tramo precio base). Ver volume_discount_tiers.
margin_on_cost_percent: 233

# Presets de volumen (atenciones / mes) para calculador e alta.
attention_volume_presets:
  - attentions: 200
    label: 1 profesional
    hint: null
  - attentions: 400
    label: 2 profesionales
    hint: null
  - attentions: 800
    label: 4 profesionales
    hint: null
  - attentions: 2000
    label: Clínica chica
    hint: null
  - attentions: 5000
    label: Clínica
    hint: null
  - attentions: 10000
    label: Centro
    hint: null
  - attentions: 20000
    label: Centro grande
    hint: null
  - attentions: 50000
    label: Enterprise
    hint: null
  - attentions: 100000
    label: Enterprise+
    hint: null

attention_volume_scale:
  - 200
  - 400
  - 800
  - 2000
  - 5000
  - 10000
  - 20000
  - 50000
  - 100000

defaults:
  consultorio_attentions: 200
  clinica_attentions: 5000

# Descuento por volumen: atenciones totales = suma contratada (cualquier clase).
volume_discount_tiers:
  - id: lista
    label: Precio base
    min_attentions: 1
    max_attentions: 4999
    margin_on_cost_percent: 233
    discount_vs_list_percent: 0
    margin_after_iibb_ganancias_percent: 49
  - id: mediano
    label: Mediano
    min_attentions: 5000
    max_attentions: 14999
    margin_on_cost_percent: 163
    discount_vs_list_percent: 21
    margin_after_iibb_ganancias_percent: 43.5
  - id: grande
    label: Grande
    min_attentions: 15000
    max_attentions: 39999
    margin_on_cost_percent: 134
    discount_vs_list_percent: 30
    margin_after_iibb_ganancias_percent: 40
  - id: enterprise
    label: Enterprise
    min_attentions: 40000
    max_attentions: null
    margin_on_cost_percent: 117
    discount_vs_list_percent: 35
    margin_after_iibb_ganancias_percent: 37.5

cogs_source: web/docs/costos/costos-api.md — context caching; chat 10 msgs (capacidad); motivos audio al 30%; dictado incluido

# Política de capacidades:
# - AMB: dictado incluido; videollamada opcional (STT de la llamada no se cobra dos veces).
# - EMER / IMP: dictado incluido; videollamada no disponible.
# - Motivos: capacidad de audio disponible; COGS comercial asume ~30% de uso.
# - Chat paciente (§1, cupo 10 msgs): solo AMB.
addons:
  videollamada:
    label: Videollamada
    description: Teleconsulta self-host (SFU + TURN + Track Egress + storage). La transcripción ya está cubierta por el dictado incluido.
    default: false

sellable_classes:
  AMB:
    label: Ambulatorio
    short: Consultorios y turnos
    includes_patient_chat: true
    audio_included: true
    videollamada_allowed: true
    includes:
      - Agenda de cupos y reserva paciente
      - Captura clínica AMB con dictado
      - App paciente (turnos)
      - Chat paciente alrededor del turno (hasta 10 mensajes)
      - Motivos de consulta (audio según uso real)
    product_gates:
      - session_encounter_class
      - amb_agenda
      - patient_booking
  EMER:
    label: Urgencia / guardia
    short: Tablero y plantel de guardia
    includes_patient_chat: false
    audio_included: true
    videollamada_allowed: false
    includes:
      - Cobertura / roster EMER
      - Tablero de guardia
      - Captura clínica EMER (dictado incluido)
      - Motivos de consulta (audio según uso real)
    product_gates:
      - session_encounter_class
      - emer_cobertura
      - emer_tablero
  IMP:
    label: Internación
    short: Piso, camas y evoluciones
    includes_patient_chat: false
    audio_included: true
    videollamada_allowed: false
    includes:
      - Cobertura / roster IMP
      - Mapa de camas
      - Captura / evoluciones (dictado incluido)
      - Motivos de consulta (audio según uso real)
    product_gates:
      - session_encounter_class
      - imp_cobertura
      - imp_mapa

non_sellable_default: disabled

simulator:
  title: Calculá tu licencia
  subtitle: Elegí tipos de atención y el volumen aproximado. El dictado está incluido; la videollamada es opcional en ambulatorio.
  cta_label: Crear cuenta
  cta_href: alta.html
  footnotes: []
