intent_id: turnos.crear-como-paciente
version: 1

action_name: "Reservar turno"
description: "Flujo conversacional para autogestión de turno: servicio, centro de salud, profesional, horario y tipo de atención."
rbac_route: "/api/turnos/crear-como-paciente"
keywords:
  - turno
  - sacar turno
  - reservar turno
  - pedir turno
  - autogestión

intent_semantics:
  goal: >-
    Reservar un turno de atención seleccionando servicio, centro de salud, profesional y un horario disponible.
  how: >-
    El flujo guía la selección de servicio → centro de salud (lista o cercano) → profesional → horario, y finaliza con confirmación/creación.
  preconditions:
    - El usuario puede autogestionar turnos.
    - Existe disponibilidad (slots) para el servicio/centro/profesional elegidos.
  constraints:
    - Para ver horarios debe existir un profesional y un centro seleccionados.
    - La opción “cercano” requiere geolocalización del cliente.
  outcome:
    - Turno creado/confirmado para el slot seleccionado.
  keyphrases:
    - reservar una cita
    - sacar turno en un centro de salud
    - elegir servicio y horario disponible

draft_keys_extra:
  - tipo_atencion

subintents:
  - id: select_servicio
    assistant_text: "Servicio"
    provides:
      - draft.id_servicio_asignado
    next: select_efector
    open_ui:
      action_id: servicios.elegir

  - id: select_efector
    assistant_text: "Centro de salud"
    requires:
      - draft.id_servicio_asignado
    provides:
      - draft.id_efector
    next: select_rrhh
    chooser:
      when_user_says_nearby:
        open_ui:
          action_id: efectores.listar-por-servicio-cercano
          params:
            id_servicio: "draft.id_servicio_asignado"
      otherwise:
        open_ui:
          action_id: efectores.listar-por-servicio
          params:
            id_servicio: "draft.id_servicio_asignado"

  - id: select_rrhh
    assistant_text: "Profesional"
    requires:
      - draft.id_efector
      - draft.id_servicio_asignado
    provides:
      - draft.id_rr_hh
    next: select_slot
    open_ui:
      action_id: recurso-humano.listar-por-efector-servicio-acepta-turnos
      params:
        id_efector: "draft.id_efector"
        id_servicio: "draft.id_servicio_asignado"

  - id: select_slot
    assistant_text: "Horario"
    requires:
      - draft.id_rr_hh
    provides:
      - draft.slot_id
    next: confirm
    open_ui:
      action_id: turnos.slots-disponibles-como-paciente
      params:
        id_servicio: "draft.id_servicio_asignado"
        id_efector: "draft.id_efector"
        id_rr_hh: "draft.id_rr_hh"

  - id: confirm
    assistant_text: "Confirmación"
    requires:
      - draft.slot_id
    submit:
      action_id: turnos.crear-como-paciente
