     inkscape:current-layer="layer-marca" />
  <title>Bioenlace 1a nodes and bridge</title>
  <desc>Two circular nodes connected by an upper arch.</desc>
  <defs id="defs">
    <style type="text/css"><![CDATA[
      .nodo { fill: #38be7f; stroke: #093e4d; stroke-width: 6; }
      .puente { fill: none; stroke: #093e4d; stroke-width: 28; stroke-linecap: round; stroke-linejoin: round; }
    ]]></style>
  </defs>
  <g inkscape:groupmode="layer" inkscape:label="Fondo" id="layer-fondo" sodipodi:insensitive="true">
    <rect width="512" height="512" fill="#ffffff" id="bg" />
  </g>
  <g inkscape:groupmode="layer" inkscape:label="Marca" id="layer-marca">
    <g id="marca" inkscape:label="Icon nodes plus bridge">
      <path
         id="puente"
         class="puente"
         d="M 128 272 Q 256 88 384 272" />
      <circle id="nodo-izq" class="nodo" cx="128" cy="272" r="52" />
      <circle id="nodo-der" class="nodo" cx="384" cy="272" r="52" />
    </g>
  </g>
  <g inkscape:groupmode="layer" inkscape:label="Guias" id="layer-guias" style="display:none" sodipodi:insensitive="true">
    <rect x="32" y="32" width="448" height="448" fill="none" stroke="#cccccc" stroke-width="1" stroke-dasharray="4 4" id="safe" />
