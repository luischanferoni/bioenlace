intent_id: data-access.editar
version: 1

action_name: "Edición"
description: "Modificar datos autorizados: elegir sujeto, aspectos y confirmar cambios."
rbac_route: "/api/editar"
keywords:
  - editar
  - modificar
  - actualizar
  - cambiar
  - corregir dato
  - modificar agenda
  - editar agenda
  - agenda profesional
  - horarios profesional

intent_semantics:
  goal: >-
    Modificar solo los aspectos permitidos sobre un registro (sin wizard de alta completa),
    incluida la agenda/horarios de un profesional del efector.
  how: >-
    Resuelve la superficie de edición, permite elegir sujeto vía listado si hace falta,
    luego aspectos editables según permisos write por grupo de atributos.
    El aspecto agenda_horarios abre la pantalla profesional-agenda.configurar-agenda.
  outcome:
    - El staff edita únicamente lo autorizado, con confirmación antes de persistir.
  keyphrases:
    - editar horarios existentes
    - ajustar disponibilidad en agenda
    - configurar agenda de profesional ya asociado
    - modificar agenda del personal
    - editar agenda del medico del centro

draft_hydrator:
  handler: data_access.edit_flow
  channel: editar

subintents:
  - id: ejecutar_edicion
    assistant_text: ""
    next: ""
    open_ui:
      action_id: data-access.editar
      params:
        surface_id: "draft.surface_id"
        id_efector: "draft.id_efector"
        step: "draft.edit_step"
        aspect_ids: "draft.aspect_ids"
