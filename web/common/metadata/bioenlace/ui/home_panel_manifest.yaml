# Manifiesto del panel de inicio (web site/index + apps).
# El orquestador HomePanelService interpreta audience + encounter_class.

audience:
  staff_roles:
    - Medico
    - enfermeria
    - Administrativo
    - AdminEfector
    - facturista
    - nivelCentral
  patient_role: paciente

panels:
  staff:
    EMER:
      layout: clinical_board
      title: Tablero de guardia
      sections:
        - id: emergency_board
          provider: emergency_board
          kind: emergency_board
          poll_interval_seconds: 30
        - id: emergency_indicators
          provider: emergency_indicators
          kind: emergency_indicators
    AMB:
      layout: clinical_list
      title: Pacientes del día
      sections:
        - id: staff_agenda_kpis
          provider: staff_agenda_kpis
          kind: staff_kpi_group
        - id: appointments_day
          provider: appointments_day
          kind: appointments_day
    IMP:
      layout: clinical_list
      title: Internación
      imp_surgical:
        sections:
          - id: surgeries_day
            provider: surgeries_day
            kind: surgeries_day
      imp_floor:
        sections:
          - id: staff_internacion_kpis
            provider: staff_internacion_kpis
            kind: staff_kpi_group
          - id: inpatients
            provider: inpatients
            kind: inpatients
  fallback:
    layout: staff_dashboard
    title: Panel operativo
    sections: []
  staff_operations:
    layout: staff_dashboard
    title: Panel operativo
    sections:
      - id: staff_session_context
        provider: staff_session_context
        kind: staff_session_context
      - id: staff_agenda_kpis
        provider: staff_agenda_kpis
        kind: staff_kpi_group
      - id: staff_guardia_kpis
        provider: staff_guardia_kpis
        kind: staff_kpi_group
      - id: staff_internacion_kpis
        provider: staff_internacion_kpis
        kind: staff_kpi_group
  patient:
    layout: patient_home
    title: Inicio
    sections:
      - id: upcoming_appointments
        provider: patient_upcoming_appointments
        kind: patient_upcoming_appointments
      - id: care_plans_active
        provider: patient_care_plans_active
        kind: patient_care_plans_active
