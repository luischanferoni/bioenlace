# Prompts y heurísticas de IA para texto clínico (Bioenlace).
# {@see ClinicalTextIaMetadata}
version: 1

snomed_context:
  categories:
    diagnosticos: diagnósticos médicos, enfermedades, condiciones patológicas, hallazgos clínicos
    sintomas: síntomas, signos, manifestaciones clínicas, motivos de consulta
    medicamentos: medicamentos, fármacos, sustancias farmacológicas, tratamientos
    procedimientos: procedimientos médicos, intervenciones, técnicas diagnósticas, exámenes
  default_category_label: conceptos médicos
  prompt_template: |
    Analiza el siguiente término médico en el contexto de {contexto} y proporciona el término SNOMED CT más apropiado y preciso.

    Término: '{texto}'
    Contexto: {contexto}

    Responde SOLO con el término SNOMED CT más preciso, sin explicaciones adicionales:

encounter_automatic_coding:
  max_diagnosticos: 8
  prompt_template: |
    Sos el motor de codificación diagnóstica del HIS Bioenlace. Debés elegir los códigos oficiales y persistirlos; no sugerís al médico para confirmar.

    {patient_context}

    Texto clínico del encounter (dictado / evolución):
    ---
    {clinical_text}
    ---

    {diagnosis_hints}

    Devolvé SOLO JSON válido con esta forma:
    {
      "diagnosticos": [
        {
          "termino": "nombre del diagnóstico en español",
          "codigo_cie10": "código CIE-10-ES sin espacios (ej. J06.9) o null",
          "codigo_snomed": "conceptId SNOMED CT numérico o null",
          "rol": "principal|secundario",
          "justificacion": "breve cita del texto que sustenta el código"
        }
      ]
    }

    Reglas:
    - Incluí al menos un diagnóstico principal si el texto lo permite.
    - Usá CIE-10-ES cuando corresponda a facturación/epidemiología en Argentina; SNOMED CT para interoperabilidad clínica.
    - Al menos uno de codigo_cie10 o codigo_snomed debe estar presente por ítem.
    - Máximo {max_diagnosticos} diagnósticos.
    - No inventes hallazgos ausentes en el texto.
    - Sin markdown ni texto fuera del JSON.

llm_correction_confidence:
  context_terms:
    - paciente
    - consulta
    - diagnóstico
    - tratamiento
    - medicamento
    - síntoma
    - enfermedad
  context_term_boost: 0.1

# Léxico clínico reutilizable (patrones RE2/PCRE). Mantener alineado con
# assistant/intent-classification-rules.yaml → vocab cuando aplique.
clinical_lexicon:
  narrative_framing: '(?iu)\b(refiere|vengo\s+por|consulta\s+por|desde\s+hace|presenta|paciente\s+con|me\s+siento|hace\s+\d+|desde\s+ayer|desde\s+hoy)\b'
  subjective_complaint: '(?iu)\b(problema|dolor|duele|sintoma|síntoma|malestar|enfermo|fiebre|tos|nausea|náusea|vomito|vómito|mareo|hinchazon|hinchazón|presion|presión|chichon|chichón|golpe|hematoma|moreton|moretón|bulto|hinchado|inflamado|herida|sangra|sangrado|cefalea|astenia|disnea|prurito|cansancio|diarrea)\b'

# Extracción IA en captura clínica (analizar encounter).
# {@see ClinicalTextIaMetadata::buildEncounterCaptureExtractionPrompt}
# {@see EncounterCaptureExtractionPostProcessor}
encounter_capture_extraction:
  prompt_template: |
    Extraé datos clínicos en JSON válido y completo (cerrá todas las llaves, corchetes y comillas).

    {classification_rules}

    Categorías (usá exactamente estos nombres como claves dentro de datosExtraidos):
    {categories_block}

    Reglas de formato:
    - Sin datos para una categoría: [].
    - No repitas el mismo dato en más de una categoría.
    - Formato JSON exacto:
      {
        "texto_procesado": "nota clínica corregida…",
        "datosExtraidos": {"nombre_categoria": []}
      }
    - Categorías SIN subdatos (Motivos, Diagnóstico, etc.): array de strings cortos y específicos (no copies párrafos enteros).
    - Categorías CON subdatos (Medicación, Prácticas, Derivaciones): array de OBJETOS con esas claves. NO uses un string único que mezcle toda la indicación.
    - Ejemplo Medicación (obligatorio si el texto indica fármaco):
      [{"Nombre del medicamento":"enalapril","Cantidad":"10","Via de administracion":"vía oral","Frecuencia de administracion":"1","Tipo de frecuencia":"DIA","Duracion del tratamiento":"30","Tipo de duracion":"DIA"}]
    - Cantidad = dosis numérica (sin unidad si va en el texto por separado; podés incluir unidad en el valor, p. ej. "10 mg").
    - Via de administracion = vía oral / VO / intravenosa / etc. cuando el texto la menciona.
    - Tipo de frecuencia / Tipo de duracion: usá DIA, HORA, SEMANA, MES o CRONICO según corresponda.

    Reglas para texto_procesado:
    - Reescribí la misma nota del profesional, más clara y correcta; no es un copy-paste del original.
    - Restaurá/correjí ortografía y tildes en español (hipertensión, diagnóstico, vía, día, presión).
    - Expandí abreviaturas habituales cuando aporte claridad (TA→tensión arterial, VO→vía oral, OD/OI, etc.).
    - Mejorá puntuación y mayúsculas; mantené cifras y dosis exactas del original.
    - Sin agregar hallazgos, fármacos, dosis ni indicaciones que no estén en el texto.
    - Sin markdown.

    {patient_context}

    Texto clínico: "{clinical_text}"

    Respondé SOLO con el JSON, sin texto adicional antes o después.
  classification_rules_template: |
    Reglas de clasificación (obligatorias):
    - No dupliques un mismo dato en más de una categoría.
    - Clasificá cada fragmento según la semántica de su categoría:
    {category_semantics}
    - Si el texto no tiene interpretación clínica (objetos cotidianos, palabras sin sentido médico, bromas, etc.), dejá todas las categorías en [].
    - Objetos cotidianos sin relación clínica (pelota, auto, mesa, etc.) no van en ninguna categoría.
    - No inventes motivos de consulta ni diagnósticos que el texto no sustente clínicamente.
    - Un término aislado que nombra una enfermedad o condición médica va en diagnóstico, no en motivos de consulta.
  category_hints:
    ConsultaMotivos: queja o síntoma referido por el paciente como motivo de la consulta
    DiagnosticoConsulta: diagnóstico, evolución o enfermedad nombrada por el profesional
    ConsultaMedicamentos: medicación indicada o registrada; devolver objetos con Nombre del medicamento, Cantidad (dosis), Via de administracion, frecuencia y duración (no un solo string)
    ConsultaPracticas: prácticas, estudios o indicaciones solicitadas
    ConsultaDerivaciones: derivación a otro servicio o profesional
    ConsultaPracticasOftalmologia: práctica o procedimiento oftalmológico
    ConsultaPracticasOftalmologiaEstudios: estudio oftalmológico solicitado o realizado
    ConsultasRecetaLentes: receta o indicación de lentes
    ConsultaOdontologiaPracticas: práctica odontológica
    ConsultaOdontologiaDiagnosticos: diagnóstico odontológico
    ConsultaOdontologiaEstados: estado dental o pieza
    ConsultaRegimen: régimen o indicación de internación
    ConsultaBalanceHidrico: balance hídrico
  post_process:
    motivo_model: ConsultaMotivos
    diagnosis_models:
      - DiagnosticoConsulta
    filter_non_clinical_extractions:
      enabled: true
      strict_category_models:
        - ConsultaMotivos
      terminology_guard_category_models: []
      retain_if_lexicon_keys:
        - narrative_framing
        - subjective_complaint
      validate_terminology: false
      snowstorm_fallback: false
    relocate_isolated_terms:
      enabled: false
      max_words: 5
