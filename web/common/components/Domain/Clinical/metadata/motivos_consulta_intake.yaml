# Guía conversacional del chat de motivos de consulta (misma superficie que motivos_consulta).
# {@see EncounterMotivosIntakeCatalogService}
version: 2
enabled: true
presentation: chat
title: "Motivos de consulta"
notes_for_staff: ""

chat_guide:
  greeting: "Hola. Para preparar tu consulta, contanos:"
  questions:
    - "¿Cuál es el principal motivo hoy?"
    - "¿Desde cuándo lo tenés?"
    - "¿Empeoró, mejoró o sigue igual?"
    - "¿Tomás alguna medicación o tenés alguna enfermedad conocida?"
    - "¿Hay algo que te preocupe especialmente (fiebre, dolor fuerte, falta de aire)?"
  footer: "Podés responder todo en un solo mensaje, por audio o con fotos si hace falta. Hasta poco antes del horario del turno armamos un resumen para el médico."

variants:
  - match:
      reserva_triage_code: zona_pecho
    extra_questions:
      - "¿Sentís opresión o dolor en el pecho al respirar o al hacer esfuerzo?"
  - match:
      reserva_triage_code: zona_cabeza
    extra_questions:
      - "¿Tuviste mareos, visión borrosa o el peor dolor de cabeza de tu vida?"
