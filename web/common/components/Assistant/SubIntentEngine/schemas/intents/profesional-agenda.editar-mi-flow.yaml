intent_id: profesional-agenda.editar-mi-flow
version: 1

action_name: "Editar mi agenda"
description: "Para modificar tus horarios de atención en un servicio del efector."
rbac_route: "/api/profesional-agenda/editar-mi-flow"
keywords:
  - mi agenda
  - mis horarios
  - editar mi agenda
  - modificar mi agenda
  - mis horarios laborales
  - configurar mi agenda

intent_semantics:
  goal: >-
    Ajustar la agenda laboral del profesional autenticado en el efector operativo, sin elegir otro médico.
  how: >-
    Elegí uno de tus servicios en el efector; si admite turnos abrís la configuración de agenda y guardás;
    si no admite agenda de turnos, el flujo cierra con confirmación.
  preconditions:
    - Profesional autenticado con asignación en el efector de sesión.
    - Al menos un servicio seleccionable en el efector.
  constraints:
    - Solo servicios propios; no permite editar la agenda de otro profesional.
    - Para configurar agenda, el servicio asociado debe habilitar turnos.
  outcome:
    - Horarios/agenda actualizados cuando el servicio admite turnos; acuse de cierre del flujo en todos los casos.
  keyphrases:
    - cambiar mis horarios de atención
    - ajustar mi disponibilidad en agenda
    - editar agenda del servicio donde trabajo

draft_keys_extra:
  - servicio_acepta_turnos
  - agenda_ui_completed

draft_hydrator:
  handler: organization.pes_from_servicio
  require_own_pes: true

business_rules:
  - id: agenda_staff_vs_propia
    when: pre_flow
    checker: content_regex
    require_any:
      - "(editar|modificar|actualizar|configurar|ajustar|cargar).*(agenda|horario)"
    forbid_any:
      - "otro|otra|del médico|del medico|del doctor|del profesional|para el|para la|secretaría|secretaria"
    user_message: >-
      ¿Querés editar tu propia agenda o la de otro profesional del efector?
    remediation:
      - id: mi_agenda
        label: "Mi agenda (mis servicios)"
        intent_id: profesional-agenda.editar-mi-flow
        reset_flow: true
      - id: otro_profesional
        label: "Agenda de otro profesional (edición dispersa)"
        intent_id: data-access.editar
        reset_flow: true

subintents:
  - id: select_servicio
    assistant_text: "Servicio"
    provides:
      - draft.id_servicio
      - draft.id_profesional_efector_servicio
    next_routing:
      - when:
          draft_equals:
            servicio_acepta_turnos: "SI"
        next: configurar_agenda_datos
      - when:
          draft_equals:
            servicio_acepta_turnos: "NO"
        next: ""
      - when:
          default: true
        next: ""
    open_ui:
      action_id: profesional-efector-servicio.listar-mis-servicios-en-efector

  - id: configurar_agenda_datos
    assistant_text: "Agenda"
    provides:
      - draft.agenda_ui_completed
    requires:
      - draft.id_profesional_efector_servicio
      - draft.id_servicio
    next: ""
    open_ui:
      action_id: profesional-agenda.configurar-agenda
      params:
        id_profesional_efector_servicio: "draft.id_profesional_efector_servicio"
        id_servicio: "draft.id_servicio"
        ui_step: "datos"

flow_submit:
  action_id: profesional-agenda.editar-mi-flow
  params:
    id_profesional_efector_servicio: "draft.id_profesional_efector_servicio"
    id_servicio: "draft.id_servicio"
