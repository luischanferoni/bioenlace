# Grupos de presentación + permisos por atributo (read / info / edit).
entity: Persona
model: common\models\Persona

attributes:
  nombre:
    read: true
    info: true
  apellido:
    read: true
    info: true
  documento:
    read: true
    info: true
  cuil:
    read: true
    info: true
  id_tipodoc:
    read: true
    info: false
  sexo_biologico:
    read: true
    info: true
  genero:
    read: true
    info: true
  fecha_nacimiento:
    read: true
    info: true

groups:
  identidad_basica:
    - nombre
    - apellido
    - documento
    - id_tipodoc
  sexo_genero:
    - sexo_biologico
    - genero
  edad_exacta:
    - fecha_nacimiento
  identificadores:
    - documento
    - id_tipodoc
    - cuil
