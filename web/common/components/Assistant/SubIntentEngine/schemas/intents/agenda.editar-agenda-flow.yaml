# Deprecado: usar intent `data-access.editar` (aspecto agenda_horarios → configurar-agenda).
# Se conserva para cierres POST en vuelo y SubIntentEngine; no aparece en el catálogo del asistente.
intent_id: agenda.editar-agenda-flow
version: 1
catalog_exclude: true
deprecated_successor: data-access.editar

action_name: "Editar agenda (legacy)"
description: "Deprecado — reemplazado por edición dispersa data-access.editar."
rbac_route: "/api/profesional-agenda/editar-agenda-flow"
keywords: []

intent_semantics:
  goal: >-
    Cargar o ajustar horarios de agenda de un profesional ya existente en el contexto de un servicio que habilite turnos.
  how: >-
    Seleccioná profesional y servicio; si el servicio habilita turnos abrís la configuración de agenda y guardás;
    si no admite agenda de turnos, el flujo cierra con confirmación. El cierre declarativo usa la misma ruta RBAC del intent.
  preconditions:
    - El profesional ya existe y es seleccionable.
    - Existe un servicio seleccionable en el efector.
  constraints:
    - Para configurar agenda, el servicio asociado debe habilitar turnos.
  outcome:
    - Horarios/agenda actualizados cuando el servicio admite turnos; acuse de cierre del flujo en todos los casos.
  keyphrases: []

draft_keys_extra:
  - servicio_acepta_turnos
  - agenda_ui_completed

draft_hydrator:
  handler: organization.pes_from_servicio

business_rules:
  - id: agenda_alta_vs_solo_horarios
    when: pre_flow
    checker: content_regex
    require_any:
      - "(cargar|configurar|editar|modificar|actualizar).*(agenda|horario)"
      - "m[eé]dico|profesional|doctor"
    forbid_any:
      - "crear|agregar|nuevo|alta|asociar|recurso humano"
    user_message: >-
      Parece que querés trabajar con agenda u horarios de un profesional.
      ¿Necesitás el flujo completo (asociar profesional y servicio) o solo cargar horarios porque ya tiene el servicio con turnos?
    remediation:
      - id: solo_agenda
        label: "Solo horarios (edición dispersa)"
        intent_id: data-access.editar
        reset_flow: true
      - id: mi_agenda
        label: "Mi agenda (mis servicios)"
        intent_id: agenda.editar-mi-agenda-flow
        reset_flow: true
      - id: flujo_completo
        label: "Flujo completo (profesional / servicio / agenda si aplica)"
        intent_id: agenda.crear-profesional-flow
        reset_flow: true

subintents:
  - id: select_profesional
    assistant_text: "Profesional"
    provides:
      - draft.id_profesional_efector_servicio
    next: select_servicio
    open_ui:
      action_id: profesional-efector-servicio.listar-por-efector-acepta-turnos

  - id: select_servicio
    assistant_text: "Servicio"
    requires:
      - draft.id_profesional_efector_servicio
    provides:
      - draft.id_servicio
    next_routing:
      - when:
          draft_equals:
            servicio_acepta_turnos: "SI"
        next: configurar_agenda
      - when:
          draft_equals:
            servicio_acepta_turnos: "NO"
        next: ""
      - when:
          default: true
        next: ""
    open_ui:
      action_id: profesional-efector-servicio.listar-servicios-en-efector
      params:
        id_profesional_efector_servicio: "draft.id_profesional_efector_servicio"

  - id: configurar_agenda
    assistant_text: "Agenda"
    provides:
      - draft.agenda_ui_completed
    requires:
      - draft.id_profesional_efector_servicio
      - draft.id_servicio
    next: ""
    open_ui:
      action_id: profesional-agenda.configurar-agenda
      params:
        id_profesional_efector_servicio: "draft.id_profesional_efector_servicio"
        id_servicio: "draft.id_servicio"

flow_submit:
  action_id: profesional-agenda.editar-agenda-flow
  params:
    id_profesional_efector_servicio: "draft.id_profesional_efector_servicio"
    id_servicio: "draft.id_servicio"
