intent_id: turnos.consultar-ocupacion-dia-flow
permission: Turno.view_occupancy
version: 1

action_name: "Consultar ocupación del día"
description: "Ver horarios disponibles y ocupación del día."
rbac_route: "/api/turnos/consultar-ocupacion-dia"
keywords:
  - ocupación del día
  - disponibilidad día
  - slots del día
  - agenda ocupación

intent_semantics:
  goal: >-
    Consultar ocupación y slots de un día para planificación operativa.
  how: >-
    Pantalla consultar-ocupacion-dia (fecha, servicio o PES).
  outcome:
    - Payload con eventos/slots del día consultado.

subintents:
  - id: consultar
    assistant_text: "Día y agenda"
    provides:
      - draft.dia
      - draft.id_servicio
      - draft.id_profesional_efector_servicio
      - draft.formato
    next: ""
    open_ui:
      action_id: turnos.consultar-ocupacion-dia

flow_submit:
  action_id: turnos.consultar-ocupacion-dia
  params:
    dia: "draft.dia"
    id_servicio: "draft.id_servicio"
    id_profesional_efector_servicio: "draft.id_profesional_efector_servicio"
    formato: "draft.formato"
