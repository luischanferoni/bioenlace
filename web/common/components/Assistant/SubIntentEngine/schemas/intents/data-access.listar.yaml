intent_id: data-access.listar
version: 1

action_name: "Listado"
description: "Ver registros en tabla según la consulta."
rbac_route: "/api/listar"
keywords:
  - listar
  - mostrar
  - ver listado
  - listado
  - nombres
  - quienes

intent_semantics:
  goal: >-
    Ver filas de una entidad (nombres y columnas según permisos del rol).
  how: >-
    Resuelve la métrica según el pedido del usuario y abre /api/listar con los filtros inferidos.
  outcome:
    - El usuario identifica registros con los datos visibles para su rol.

draft_hydrator:
  handler: data_access.metric_flow
  channel: listar

subintents:
  - id: ejecutar_listado
    assistant_text: "Listado"
    next: ""
    open_ui:
      action_id: data-access.listar
      params:
        metric_id: "draft.metric_id"
        id_efector: "draft.id_efector"
        servicio_rol: "draft.servicio_rol"
        servicio_rol_mention: "draft.servicio_rol_mention"
        sexo_biologico: "draft.sexo_biologico"
