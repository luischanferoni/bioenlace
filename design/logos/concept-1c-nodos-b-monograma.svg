<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!-- Bioenlace concept 1c: letter B with round strokes and nodes on the bowls. -->
<svg
   width="128mm"
   height="128mm"
   viewBox="0 0 512 512"
   version="1.1"
   id="svg-root"
   inkscape:version="1.4"
   sodipodi:docname="concept-1c-nodos-b-monograma.svg"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg">
  <sodipodi:namedview
     id="namedview"
     pagecolor="#ffffff"
     bordercolor="#666666"
     borderopacity="1"
     inkscape:pageshadow="2"
     inkscape:pageopacity="0"
     inkscape:pagecheckerboard="false"
     inkscape:deskcolor="#d1d1d1"
     inkscape:document-units="mm"
     inkscape:zoom="1.4"
     inkscape:cx="256"
     inkscape:cy="256"
     inkscape:window-maximized="1"
     inkscape:current-layer="layer-marca" />
  <title>Bioenlace 1c B monogram with nodes</title>
  <desc>Vertical bar and two cubic bowls; tweak handles in Inkscape node tool.</desc>
  <defs id="defs">
    <style type="text/css"><![CDATA[
      .barra { fill: none; stroke: #093e4d; stroke-width: 42; stroke-linecap: round; }
      .lazo { fill: none; stroke: #093e4d; stroke-width: 36; stroke-linecap: round; stroke-linejoin: round; }
      .nodo { fill: #38be7f; stroke: #093e4d; stroke-width: 5; }
    ]]></style>
  </defs>
  <g inkscape:groupmode="layer" inkscape:label="Fondo" id="layer-fondo" sodipodi:insensitive="true">
    <rect width="512" height="512" fill="#ffffff" id="bg" />
  </g>
  <g inkscape:groupmode="layer" inkscape:label="Marca" id="layer-marca">
    <g id="marca" inkscape:label="B plus nodes">
      <path id="barra" class="barra" d="M 138 104 L 138 408" />
      <path id="lazo-sup" class="lazo" d="M 158 112 C 312 96 336 188 158 248" />
      <path id="lazo-inf" class="lazo" d="M 158 264 C 336 264 336 356 158 400" />
      <circle id="nodo-sup" class="nodo" cx="312" cy="176" r="36" />
      <circle id="nodo-inf" class="nodo" cx="312" cy="336" r="36" />
    </g>
  </g>
</svg>
