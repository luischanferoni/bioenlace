# Grupos, métricas staff y superficies de edición — ProfesionalEfectorServicio.
entity: ProfesionalEfectorServicio
groups:
  asignacion:
    attributes: [id_efector, id_servicio, id_persona]
  # Solo registro del grupo (clave para grants y aspectos). Campos → admin «Campos por grupo (BD)» o tabla data_access_attribute_field.
  agenda_horarios: {}

metrics:
  profesionales_conteo_efector:
    label: Conteo de profesionales por efector
    keywords:
      - cuantos profesionales
      - cuantos medicos hay
      - cantidad de profesionales
      - total de profesionales
      - planta profesional
      - personal del centro
    presentation_handler: organization.profesionales_conteo_info
    scope_checker: efector_sesion
    required_groups:
      - ProfesionalEfectorServicio.asignacion
    optional_filter_groups:
      - Persona.sexo_genero
    filter_scope_checkers:
      Persona.sexo_genero: efector_sesion_via_pes
    query:
      root:
        model: common\models\ProfesionalEfectorServicio
        alias: pes
      joins:
        persona:
          table: personas
          alias: p
          on: 'p.id_persona = pes.id_persona'
          type: inner
          activate_when_filters: [sexo_biologico]
          entity_group: Persona.sexo_genero
      scope_columns:
        id_efector: pes.id_efector
        id_persona: pes.id_persona
      base_where:
        pes.deleted_at: null
      filters:
        servicio_rol:
          resolver: servicio_rol_efector_ids
          apply_column: pes.id_servicio
          apply_op: in
        servicio_rol_mention:
          resolver: servicio_rol_from_mention
          normalize_to: servicio_rol
        sexo_biologico:
          entity_group: Persona.sexo_genero
          resolver: sexo_biologico
          apply_column: p.sexo_biologico
          apply_op: eq
          requires_join: persona
      aggregation:
        default: count_distinct_persona
        definitions:
          count_distinct_persona:
            type: count_distinct
            column: pes.id_persona
      output:
        modes: [aggregate]
        default: aggregate

  profesionales_listado_efector:
    label: Listado de profesionales por efector
    keywords:
      - listar profesionales
      - mostrar profesionales del centro
      - mostrar medicos del centro
      - profesionales del centro
      - quienes trabajan en el centro
      - nombres de profesionales
      - plantilla del centro
    presentation_handler: organization.profesionales_listado_rows
    scope_checker: efector_sesion
    required_groups:
      - ProfesionalEfectorServicio.asignacion
    read_groups:
      - Persona.identidad_basica
    optional_filter_groups:
      - Persona.sexo_genero
    filter_scope_checkers:
      Persona.sexo_genero: efector_sesion_via_pes
    query:
      root:
        model: common\models\ProfesionalEfectorServicio
        alias: pes
      joins:
        persona:
          table: personas
          alias: p
          on: 'p.id_persona = pes.id_persona'
          type: inner
          entity_group: Persona.identidad_basica
      scope_columns:
        id_efector: pes.id_efector
        id_persona: pes.id_persona
      base_where:
        pes.deleted_at: null
      filters:
        servicio_rol:
          resolver: servicio_rol_efector_ids
          apply_column: pes.id_servicio
          apply_op: in
        servicio_rol_mention:
          resolver: servicio_rol_from_mention
          normalize_to: servicio_rol
        sexo_biologico:
          entity_group: Persona.sexo_genero
          resolver: sexo_biologico
          apply_column: p.sexo_biologico
          apply_op: eq
          requires_join: persona
      output:
        modes: [rows]
        default: rows
        rows:
          max_limit: 200
          distinct_column: pes.id
          order_by:
            p.apellido: ASC
            p.nombre: ASC
          static_joins: [persona]
          fields:
            id_profesional_efector_servicio:
              column: pes.id
              group: ProfesionalEfectorServicio.asignacion
            id_persona:
              column: pes.id_persona
              group: ProfesionalEfectorServicio.asignacion
            id_servicio:
              column: pes.id_servicio
              group: ProfesionalEfectorServicio.asignacion
            nombre:
              column: p.nombre
              group: Persona.identidad_basica
            apellido:
              column: p.apellido
              group: Persona.identidad_basica
            sexo_biologico:
              column: p.sexo_biologico
              group: Persona.sexo_genero

  profesionales_conteo_por_servicio_efector:
    label: Distribución de profesionales por servicio
    keywords:
      - profesionales por servicio
      - distribucion por especialidad
    scope_checker: efector_sesion
    required_groups:
      - ProfesionalEfectorServicio.asignacion
    query:
      root:
        model: common\models\ProfesionalEfectorServicio
        alias: pes
      joins:
        servicio:
          table: servicios
          alias: s
          on: 's.id_servicio = pes.id_servicio'
          type: inner
      scope_columns:
        id_efector: pes.id_efector
      base_where:
        pes.deleted_at: null
      filters:
        servicio_rol:
          resolver: servicio_rol_efector_ids
          apply_column: pes.id_servicio
          apply_op: in
        servicio_rol_mention:
          resolver: servicio_rol_from_mention
          normalize_to: servicio_rol
      aggregation:
        default: count_by_servicio
        definitions:
          count_by_servicio:
            type: count_distinct
            column: pes.id_persona
            group_by: [pes.id_servicio, s.nombre]
            result_keys:
              id_servicio: pes.id_servicio
              servicio_nombre: s.nombre
              total: count
      output:
        modes: [grouped, aggregate]
        default: grouped

edit_surfaces:
  profesional_en_efector:
    label: Personal del centro
    keywords:
      - editar personal
      - modificar profesional
      - editar agenda del personal
      - modificar agenda de un profesional
      - cambiar datos del medico
      - editar medico del centro
    scope_checker: efector_sesion
    subject_resolver:
      metric_id: profesionales_listado_efector
      selection_param: id_persona
      pes_param: id_profesional_efector_servicio
    aspects:
      identidad:
        label: Identidad (nombre y apellido)
        kind: field_group
        attribute_group: Persona.identidad_basica
        fields: [nombre, apellido, otro_nombre, otro_apellido]
        keywords:
          - identidad
          - nombre
          - apellido
          - datos personales
          - cambiar nombre
      agenda_horarios:
        label: Agenda y horarios
        kind: field_group
        attribute_group: ProfesionalEfectorServicio.agenda_horarios
        submit_handler: profesional-agenda.configurar-agenda
        prefill: agenda_config
        keywords:
          - agenda
          - horarios
          - horario
          - cupo
          - editar agenda
