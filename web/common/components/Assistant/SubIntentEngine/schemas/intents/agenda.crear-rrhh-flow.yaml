intent_id: agenda.crear-rrhh-flow
version: 1

action_name: "Crear recurso humano"
rbac_route: "/api/agenda/crear-agenda-flow"
keywords:
  - crear recurso humano
  - agregar recurso humano
  - agregar profesional
  - agenda médico
  - agenda medico
  - horarios médico
  - horarios medico

draft_keys_extra:
  - servicio_acepta_turnos

business_rules:
  - id: agenda_alta_vs_solo_horarios
    when: pre_flow
    checker: agenda_alta_vs_solo_horarios
    user_message: >-
      Parece que querés trabajar con agenda u horarios de un profesional.
      ¿Necesitás el flujo completo (asociar profesional y servicio) o solo cargar horarios porque ya tiene el servicio con turnos?
    remediation:
      - id: flujo_completo
        label: "Flujo completo (profesional / servicio / agenda si aplica)"
        intent_id: agenda.crear-rrhh-flow
        reset_flow: true
      - id: solo_agenda
        label: "Solo horarios (ya tiene servicio que acepta turnos)"
        intent_id: agenda.editar-agenda-flow
        reset_flow: true

subintents:
  - id: select_rrhh
    assistant_text: "Profesional"
    provides:
      - draft.id_rr_hh
    next: select_servicio
    open_ui:
      action_id: rrhh.listar-por-efector-acepta-turnos

  - id: select_servicio
    assistant_text: "Servicio"
    requires:
      - draft.id_rr_hh
    provides:
      - draft.id_servicio
    next_routing:
      - when:
          draft_equals:
            servicio_acepta_turnos: "SI"
        next: configurar_agenda
      - when:
          draft_equals:
            servicio_acepta_turnos: "NO"
        next: condicion_laboral
      - when:
          default: true
        next: condicion_laboral
    open_ui:
      action_id: rrhh.listar-servicios-en-efector
      params:
        id_rr_hh: "draft.id_rr_hh"

  - id: configurar_agenda
    assistant_text: "Agenda"
    requires:
      - draft.id_rr_hh
      - draft.id_servicio
    next: condicion_laboral
    open_ui:
      action_id: agenda.configurar-agenda
      params:
        id_rr_hh: "draft.id_rr_hh"
        id_servicio: "draft.id_servicio"

  - id: condicion_laboral
    assistant_text: "Condición laboral"
    requires:
      - draft.id_rr_hh
    next: ""
    open_ui:
      action_id: rrhh.editar-condicion-laboral
      params:
        id_rr_hh: "draft.id_rr_hh"
