# Precio orientativo por profesional × encounter_class (USD / mes, sin IVA).
# Fórmula: precio_clase = COGS_ref × (vol_clase/ref) × (1 + margin_on_cost_percent/100)
# El margen sobre costo baja por tramo según PES totales contratados (suma AMB+EMER+IMP).
# COGS: web/docs/costos/costos-api.md (columna con context caching; Gemini + Groq; video §6).
# Actualizar también institucional/js/pricing-config.json al cambiar cifras.
version: 6
currency: USD
billing_period: month
tax_note: No incluye IVA.

default_when_empty: allow_all

# Volumen de referencia costos-api (AMB): 400 encounters/prof/mes.
reference_encounters_per_professional_month: 400

# COGS variable por profesional/mes a volumen reference (400), escenario con context caching.
# base = Apartado 1 motivos texto con caché SIN STT del profesional (~2,35 − 1,40 bruto).
# audio = STT profesional §4 con −30 % on-device (bruto ~1,40 → 0,98).
# videollamada = COGS §6 self-host Track Egress + storage (3,50). El STT de la llamada
#   es el mismo que audio: se cobra una sola vez (audio || videollamada).
cogs_usd_per_professional_month:
  base: 0.95
  audio: 0.98
  videollamada: 3.50

# Margen de lista (1–19 PES). Ver volume_discount_tiers para tramos.
margin_on_cost_percent: 233

# Descuento por volumen: PES totales = suma de profesionales contratados (cualquier clase).
# margin_after_iibb_ganancias_percent: objetivo interno (~49 % lista → ~37,5 % enterprise).
# margin_on_cost_percent: markup aplicado en la fórmula de precio.
volume_discount_tiers:
  - id: lista
    label: Lista
    min_pes: 1
    max_pes: 19
    margin_on_cost_percent: 233
    margin_after_iibb_ganancias_percent: 49
  - id: mediano
    label: Mediano
    min_pes: 20
    max_pes: 49
    margin_on_cost_percent: 163
    margin_after_iibb_ganancias_percent: 43.5
  - id: grande
    label: Grande
    min_pes: 50
    max_pes: 149
    margin_on_cost_percent: 134
    margin_after_iibb_ganancias_percent: 40
  - id: enterprise
    label: Enterprise
    min_pes: 150
    max_pes: null
    margin_on_cost_percent: 117
    margin_after_iibb_ganancias_percent: 37.5

cogs_source: web/docs/costos/costos-api.md — columna con context caching

# Política de capacidades:
# - AMB: dictado y videollamada opcionales. Si hay videollamada, dictado/STT queda incluido (una vez).
# - EMER / IMP: dictado obligatorio (audio_included); videollamada no disponible.
addons:
  audio:
    label: Dictado
    description: Transcripción del audio del profesional (~5 min; −30 % on-device). Incluido si hay videollamada.
    default: false
  videollamada:
    label: Videollamada
    description: Teleconsulta self-host (SFU + TURN + Track Egress + storage). Incluye transcripción de la llamada (mismo STT que dictado).
    default: false

sellable_classes:
  AMB:
    label: Ambulatorio
    short: Consultorios y turnos
    encounters_per_professional_month: 400
    audio_included: false
    videollamada_allowed: true
    includes:
      - Agenda de cupos y reserva paciente
      - Captura clínica AMB
      - App paciente (turnos)
    product_gates:
      - session_encounter_class
      - amb_agenda
      - patient_booking
  EMER:
    label: Urgencia / guardia
    short: Tablero y plantel de guardia
    encounters_per_professional_month: 350
    audio_included: true
    videollamada_allowed: false
    includes:
      - Cobertura / roster EMER
      - Tablero de guardia
      - Captura clínica EMER (dictado incluido)
    product_gates:
      - session_encounter_class
      - emer_cobertura
      - emer_tablero
  IMP:
    label: Internación
    short: Piso, camas y evoluciones
    encounters_per_professional_month: 300
    audio_included: true
    videollamada_allowed: false
    includes:
      - Cobertura / roster IMP
      - Mapa de camas
      - Captura / evoluciones (dictado incluido)
    product_gates:
      - session_encounter_class
      - imp_cobertura
      - imp_mapa

non_sellable_default: disabled

simulator:
  title: Calculá tu licencia
  subtitle: Elegí tipos de atención y profesionales. A más profesionales contratados (suma de todos los tipos), baja el margen y el precio unitario. En ambulatorio podés sumar dictado y/o videollamada (la videollamada incluye la transcripción). En urgencia e internación el dictado va incluido y no hay videollamada.
  cta_label: Crear cuenta
  cta_href: alta.html
  footnotes:
    - Importes orientativos en USD por mes. La cotización final se confirma según el alcance de cada efector.
    - El descuento por volumen se calcula con el total de profesionales contratados (AMB + urgencia + internación), sin importar el tipo.
    - El alta online usa pasarela de pago simulada; ministerios solicitan acceso con verificación asistida.
