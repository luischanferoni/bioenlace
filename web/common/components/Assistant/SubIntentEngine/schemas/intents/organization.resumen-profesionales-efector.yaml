intent_id: organization.resumen-profesionales-efector
version: 1

action_name: "Profesionales del centro (resumen)"
description: "Conteo de profesionales del efector, con filtro opcional por especialidad o sexo biológico."
rbac_route: "/api/info"
keywords:
  - cuantos profesionales
  - cuantos medicos
  - cuantos especialistas
  - planta profesional
  - personal del centro
  - cuantos oftalmologos
  - cuantos traumatologos
  - profesionales varones
  - profesionales mujeres

intent_semantics:
  goal: >-
    Obtener un conteo de profesionales asignados al efector operativo, opcionalmente filtrado por rol de servicio o sexo biológico.
  how: >-
    Abre el resumen staff con total y texto explicativo; los filtros se infieren del mensaje cuando es posible.
  outcome:
    - El responsable del centro conoce la planta profesional sin listar personas nominadas.

draft_hydrator:
  handler: organization.profesionales_resumen_efector

subintents:
  - id: ver_resumen
    assistant_text: "Resumen de profesionales"
    provides:
      - draft.servicio_rol
      - draft.sexo_biologico
    next: ""
    open_ui:
      action_id: data-access.info
      params:
        metric_id: profesionales_conteo_efector
        id_efector: "draft.id_efector"
        servicio_rol: "draft.servicio_rol"
        servicio_rol_mention: "draft.servicio_rol_mention"
        sexo_biologico: "draft.sexo_biologico"
