# Reglas declarativas de clasificación NL → ajustes de score y fallbacks operativos.
# El motor {@see IntentClassificationRulesService} interpreta este archivo; no duplicar en PHP.
version: 1

vocab:
  edit_verbs: '\b(editar|modificar|actualizar|cambiar|corregir|ajustar|configurar)\b'
  alta_verbs: '\b(crear|agregar|nuevo|nueva|alta|asociar|dar de alta)\b'
  baja_verbs: '\b(quitar|sacar|desasignar|eliminar|dar de baja|baja)\b'
  agenda_targets: '\b(agenda|horario|horarios|disponibilidad|cupo|formas?\s+de\s+atencion|forma\s+de\s+atencion|teleconsulta|intervalo|modalidad)\b'
  own_scope: '\b(mi|mis)\s+(agenda|horario|horarios|formas?\s+de\s+atencion)\b'
  staff_third_party: '\b(profesional|medico|doctor|personal)\b'
  agenda_de_uno: '\b(agenda|horario|horarios)\s+de\s+(un|el|la|los|las)\b'
  config_topics: '\b(formas?\s+de\s+atencion|forma\s+de\s+atencion|teleconsulta|intervalo)\b'
  list_verbs: '\b(listar|mostrar|mostrame|ver listado|nombres de|quienes|quien es|quién es|plantilla)\b'
  count_verbs: '\b(cuantos|cuantos hay|total de|conteo|cantidad de|numero de|cuenta)\b'
  distribucion_servicio_phrases:
    - profesionales por servicio
    - distribucion por servicio
    - distribución por servicio
    - distribucion por especialidad
  list_phrases:
    - profesionales del centro
    - medicos del centro
  clinical_symptoms: '\b(problema|dolor|duele|sintoma|síntoma|malestar|enfermo|fiebre|tos|nausea|náusea|vomito|vómito|mareo|hinchazon|hinchazón|presion|presión|diabetes|hipertension|hipertensión|chichon|chichón|golpe|hematoma|moreton|moretón|bulto|hinchado|inflamado|cabeza|manos|pies|brazo|pierna|herida|sangra|sangrado)\b'
  scheduling_ops: '\b(turno|turnos|reservar|sacar turno|cancelar turno|cancelar|agenda|cita|reprogramar|sobreturno)\b'
  paciente_mis_turnos_phrases:
    - mis turnos
    - qué turnos tengo
    - que turnos tengo
    - decime los turnos
    - decime mis turnos
    - ver mis turnos
    - listar mis turnos
    - mis citas
    - próximos turnos
    - proximos turnos
    - turnos que tengo
    - turnos pendientes
  paciente_reservar_turno_phrases:
    - necesito un turno
    - necesito turno
    - quiero un turno
    - quiero turno
    - sacar un turno
    - pedir un turno
    - pedir turno
    - reservar un turno
    - agendar un turno
    - agendar turno
  consultas_seguimiento_phrases:
    - renovar medicacion
    - renovar medicación
    - repetir la receta
    - repetir receta
    - ajustar medicacion
    - ajustar medicación
    - duda sobre el tratamiento
    - duda del tratamiento
    - consulta sobre mi tratamiento
    - seguimiento del tratamiento
    - seguimiento de tratamiento
    - contar evolucion
    - contar evolución
    - como me fue con el tratamiento
    - consulta general
    - consulta por mensaje
    - escribir al medico
    - escribir al médico
    - preguntarle al medico
    - preguntarle al médico
  consultas_seguimiento_topics: '\b(renovar|repetir|receta|medicacion|medicación|tratamiento|seguimiento|evolucion|evolución|consulta\s+por\s+mensaje)\b'
  acute_new_symptom: '\b(me\s+siento\s+mal|malestar\s+nuevo|sintoma\s+nuevo|síntoma\s+nuevo|me\s+empeoro|empeoré|urgencia|107)\b'
  help_menu: '\b(ayuda|qué puedo|que puedo|menu|menú|opciones|qué hace|que hace|qué se puede|que se puede|mostrar acciones)\b'
  greeting: '\b(hola|buenos|gracias|qué tal|que tal|como estas|cómo estás)\b'
  resumen_phrases: '\b(resumen de|resumen)\b'
  licencia_topics: '\b(licencia|permiso|ausencia|vacacion|vacaciones|franco|condicion laboral|condición laboral)\b'
  own_licencia: '\b(mi|mis)\s+(licencia|permiso|ausencia|vacaciones|condicion laboral|condición laboral)\b'
  staff_licencia_third: '\b(licencia|permiso|ausencia|condicion laboral|condición laboral)\s+(del|de un|de la|de otro|profesional|medico|médico|colega)\b'
  provincial_resource: '\b(ministerio\s+(de\s+)?salud|organismo\s+de\s+salud|direcci[oó]n\s+del\s+ministerio|d[oó]nde\s+est[aá]\s+el\s+ministerio|ubicaci[oó]n\s+ministerio|tel[eé]fono\s+ministerio)\b'
  delegacion_repr_phrases:
    - delegar gestión de turnos
    - delegar gestion de turnos
    - delegar la gestión de turnos
    - que otra persona gestione mis turnos
    - designar representante
    - autorizar familiar
    - quien opera por mí
    - operar por mí

  tutela_menor_phrases:
    - vincular hijo
    - vincular menor
    - agregar hijo
    - tutela menor
    - mi hijo
    - mi hija
    - solicitar tutela
    - menor sin cuenta

  staff_tutela_phrases:
    - verificar tutela
    - aprobar tutela
    - solicitud tutela
    - solicitudes tutela
    - tutela pendiente
    - confirmar vínculo menor
    - vinculo pendiente menor

match_rules:
  staff_agenda_config_edit:
    require_all: [edit_verbs, agenda_targets]
    forbid_any: [alta_verbs, own_scope, baja_verbs]
    require_any: [staff_third_party, agenda_de_uno, config_topics]
    ai_hint: >-
      Si el mensaje pide modificar/editar agenda, horarios, formas de atención, teleconsulta,
      intervalo entre turnos de un profesional (sin crear/alta), priorizá el intent de edición dispersa
      staff cuyo goal/how describa modificar datos por superficie o aspectos autorizados.

  staff_pes_baja:
    require_all: [baja_verbs]
    require_any: [staff_third_party]
    forbid_any: [scheduling_ops, agenda_targets]
    ai_hint: >-
      Si el mensaje pide quitar, desasignar o dar de baja a un profesional de un servicio/efector
      (sin cancelar turnos ni editar agenda), priorizá profesional-efector-servicio.baja-flow.

  own_agenda_config_edit:
    require_all: [edit_verbs, own_scope, agenda_targets]
    forbid_any: [alta_verbs, baja_verbs]
    ai_hint: >-
      Si el mensaje pide modificar la agenda u horarios propios (mi/mis), priorizá el intent
      de edición dispersa cuyo catálogo cubra edición de agenda del profesional autenticado.

  staff_list_not_count:
    require_any: [list_verbs]
    forbid_any: [count_verbs]
    require_phrase_any: list_phrases

  staff_count:
    require_any: [count_verbs]

  staff_distribucion_servicio:
    require_phrase_any: distribucion_servicio_phrases

  staff_data_access_list:
    require_any: [list_verbs]

  staff_data_access_list_phrase:
    require_phrase_any: list_phrases

  staff_data_access_count_or_resumen:
    require_any: [count_verbs, resumen_phrases]

  staff_data_access_edit:
    require_all: [edit_verbs]
    forbid_any: [scheduling_ops]

  clinical_symptom:
    require_any: [clinical_symptoms]

  scheduling_operational:
    require_any: [scheduling_ops]

  paciente_listar_turnos:
    require_phrase_any: paciente_mis_turnos_phrases
    forbid_any: []
    ai_hint: >-
      Si el paciente pregunta qué turnos tiene o pide ver/listar sus citas (sin cancelar ni sacar uno nuevo),
      priorizá turnos.ver-mis-turnos-como-paciente.

  paciente_reservar_turno:
    require_phrase_any: paciente_reservar_turno_phrases
    forbid_any: []
    ai_hint: >-
      Si el paciente pide sacar, pedir, reservar o agendar un turno de forma genérica (sin especialidad ni síntomas),
      priorizá turnos.crear-como-paciente: el flow desambigua entre reserva directa y asistencia guiada (triage).
      No confundir con «mis turnos» ni con síntomas sin pedido de turno.

  help_menu_query:
    require_any: [help_menu]

  greeting:
    require_any: [greeting]

  own_condicion_laboral:
    require_all: [licencia_topics, own_licencia]

  staff_condicion_laboral:
    require_any: [licencia_topics, staff_licencia_third]
    forbid_any: [own_licencia]

  staff_identidad_edit:
    require_all: [edit_verbs, staff_third_party]
    forbid_any: [agenda_targets, alta_verbs, scheduling_ops]

  paciente_provincial_resource:
    require_any: [provincial_resource]

  paciente_delegar_representacion:
    require_phrase_any: delegacion_repr_phrases
    ai_hint: >-
      Si el paciente pide designar a otra persona con cuenta para operar en su nombre (régimen B),
      priorizá personas.designar-representante-flow. No confundir con tutela de menor (régimen A).

  paciente_solicitar_tutela:
    require_phrase_any: tutela_menor_phrases
    ai_hint: >-
      Si un padre/madre/tutor pide vincular o solicitar tutela sobre un menor sin cuenta (régimen A),
      priorizá personas.vincular-menor-flow. La solicitud queda pending hasta verificación del staff.

  staff_verificar_tutela:
    require_phrase_any: staff_tutela_phrases
    ai_hint: >-
      Si el staff pide verificar o aprobar solicitudes de tutela de menores (régimen A),
      priorizá personas.verificar-tutela-staff-flow.

  consultas_seguimiento_followup:
    require_any: [consultas_seguimiento_topics]
    require_phrase_any: consultas_seguimiento_phrases
    forbid_any: [acute_new_symptom]

  consultas_seguimiento_topics_only:
    require_any: [consultas_seguimiento_topics]
    forbid_any: [acute_new_symptom, clinical_symptoms]

score_adjustments:
  - when_rule: paciente_listar_turnos
    apply:
      - intent_id: turnos.ver-mis-turnos-como-paciente
        delta: 55
      - intent_id: turnos.crear-como-paciente
        delta: -35
      - intent_id: atencion.necesito-atencion
        delta: -35
      - intent_id: turnos.cancelar-como-paciente-flow
        delta: -20
      - intent_id: turnos.modificar-como-paciente-flow
        delta: -20

  - when_rule: paciente_reservar_turno
    apply:
      - intent_id: turnos.crear-como-paciente
        delta: 55
      - intent_id: turnos.ver-mis-turnos-como-paciente
        delta: -35
      - intent_id: atencion.necesito-atencion
        delta: -40
      - intent_id: turnos.cancelar-como-paciente-flow
        delta: -25
      - intent_id: turnos.modificar-como-paciente-flow
        delta: -25
      - intent_id: turnos.reubicar-como-paciente-flow
        delta: -25

  - when_rule: staff_condicion_laboral
    apply:
      - intent_id: condicion-laboral.editar-staff
        delta: 40
      - intent_id_prefix: licencia.cargar-para
        delta: 20

  - when_rule: own_condicion_laboral
    apply:
      - intent_id: condicion-laboral.editar-propio
        delta: 40
      - intent_id_prefix: licencia.cargar-como
        delta: 20

  - when_rule: staff_agenda_config_edit
    apply:
      - intent_id: profesional-agenda.configurar-staff
        delta: 45
      - intent_id: data-access.editar
        delta: 15
      - intent_id: profesional-efector-servicio.crear-flow
        delta: -30
      - intent_id: profesional-efector-servicio.baja-flow
        delta: -25
      - intent_id_prefix: licencia.cargar
        delta: -35

  - when_rule: staff_pes_baja
    apply:
      - intent_id: profesional-efector-servicio.baja-flow
        delta: 50
      - intent_id: profesional-efector-servicio.crear-flow
        delta: -40
      - intent_id: profesional-agenda.configurar-staff
        delta: -30
      - intent_id_prefix: turnos.cancelar
        delta: -35

  - when_rule: own_agenda_config_edit
    apply:
      - intent_id: profesional-agenda.configurar-propio
        delta: 45
      - intent_id: data-access.editar
        delta: 15
      - intent_id: profesional-efector-servicio.crear-flow
        delta: -30
      - intent_id_prefix: licencia.cargar
        delta: -35

  - when_rule: staff_identidad_edit
    apply:
      - intent_id: profesional-identidad.editar-staff
        delta: 40
      - intent_id: data-access.editar
        delta: 10

  - when_rule: staff_distribucion_servicio
    apply:
      - intent_id: profesionales.distribucion-servicio-efector
        delta: 40
      - intent_id: data-access.info
        delta: -15

  - when_rule: staff_list_not_count
    when_not_rule: staff_count
    apply:
      - intent_id: profesionales.listado-efector
        delta: 35
      - intent_id: data-access.listar
        delta: 10
      - intent_id: data-access.info
        delta: -20

  - when_rule: staff_list_not_count
    when_also: staff_count
    apply:
      - intent_id: profesionales.listado-efector
        delta: 15
      - intent_id: data-access.listar
        delta: 5

  - when_rule: staff_count
    apply:
      - intent_id: profesionales.conteo-efector
        delta: 35
      - intent_id: data-access.info
        delta: 5

  - when_rule: paciente_provincial_resource
    apply:
      - intent_id: paciente-contexto.recurso-provincial-como-paciente-flow
        delta: 45

  - when_rule: paciente_delegar_representacion
    apply:
      - intent_id: personas.designar-representante-flow
        delta: 55
      - intent_id: personas.vincular-menor-flow
        delta: -40
      - intent_id_prefix: turnos.
        delta: -30

  - when_rule: paciente_solicitar_tutela
    apply:
      - intent_id: personas.vincular-menor-flow
        delta: 55
      - intent_id: personas.designar-representante-flow
        delta: -40

  - when_rule: staff_verificar_tutela
    apply:
      - intent_id: personas.verificar-tutela-staff-flow
        delta: 55
      - intent_id: personas.vincular-menor-flow
        delta: -35

  - when_rule: consultas_seguimiento_followup
    apply:
      - intent_id: atencion.consultas-seguimiento-flow
        delta: 50
      - intent_id: atencion.necesito-atencion
        delta: -25

  - when_rule: consultas_seguimiento_topics_only
    when_not_rule: scheduling_operational
    apply:
      - intent_id: atencion.consultas-seguimiento-flow
        delta: 35
      - intent_id: atencion.necesito-atencion
        delta: -15

operational_fallbacks:
  - id: paciente_listar_turnos_nl
    when_any_rule: [paciente_listar_turnos]
    intent_id: turnos.ver-mis-turnos-como-paciente
    confidence: 0.92
    method: rules_declarative_fallback

  - id: paciente_reservar_turno_nl
    when_any_rule: [paciente_reservar_turno]
    intent_id: turnos.crear-como-paciente
    confidence: 0.92
    method: rules_declarative_fallback

  - id: staff_agenda_config_edit_nl
    requires_staff_data_access: true
    when_any_rule: [staff_agenda_config_edit]
    intent_id: profesional-agenda.configurar-staff
    confidence: 0.9
    method: rules_declarative_fallback

  - id: staff_pes_baja_nl
    requires_staff_data_access: true
    when_any_rule: [staff_pes_baja]
    intent_id: profesional-efector-servicio.baja-flow
    confidence: 0.9
    method: rules_declarative_fallback

  - id: own_agenda_config_edit_nl
    requires_staff_data_access: true
    when_any_rule: [own_agenda_config_edit]
    intent_id: profesional-agenda.configurar-propio
    confidence: 0.9
    method: rules_declarative_fallback

  - id: condicion_laboral_family_nl
    when_any_rule: [own_condicion_laboral, staff_condicion_laboral]
    intent_family: condicion-laboral.edit
    confidence: 0.88
    method: rules_family_fallback

  - id: paciente_provincial_resource_nl
    when_any_rule: [paciente_provincial_resource]
    intent_id: paciente-contexto.recurso-provincial-como-paciente-flow
    confidence: 0.88
    method: rules_declarative_fallback

  - id: paciente_delegar_representante_nl
    when_any_rule: [paciente_delegar_representacion]
    intent_id: personas.designar-representante-flow
    confidence: 0.9
    method: rules_declarative_fallback

  - id: paciente_solicitar_tutela_nl
    when_any_rule: [paciente_solicitar_tutela]
    intent_id: personas.vincular-menor-flow
    confidence: 0.9
    method: rules_declarative_fallback

  - id: staff_verificar_tutela_nl
    when_any_rule: [staff_verificar_tutela]
    intent_id: personas.verificar-tutela-staff-flow
    confidence: 0.9
    method: rules_declarative_fallback

  - id: consultas_seguimiento_nl
    when_any_rule: [consultas_seguimiento_followup, consultas_seguimiento_topics_only]
    when_not_rule: scheduling_operational
    intent_id: atencion.consultas-seguimiento-flow
    confidence: 0.88
    method: rules_declarative_fallback

chat_preprocess:
  entity_categories:
    - servicio
    - efector
    - persona
    - profesional
    - turno

  staff_data_access_rules:
    query_any:
      - staff_data_access_count_or_resumen
      - staff_data_access_list
      - staff_data_access_list_phrase
    edit: staff_data_access_edit
    operational_any:
      - staff_data_access_count_or_resumen
      - staff_data_access_list
      - staff_data_access_list_phrase
      - staff_data_access_edit

  prompt:
    intro: 'Analizá el mensaje del usuario para un asistente de salud.'
    rules:
      - 'user_goal operational si pide hacer algo en el sistema (turno, agenda, cancelar), consulta datos operativos del centro (cuántos profesionales hay, planta profesional, listar médicos del efector) o modificar datos del personal (editar nombre, cambiar horarios de agenda del centro).'
      - 'conversational si es saludo, consulta de salud/síntomas, lesiones (golpe, chichón, bulto), malestar o charla sin pedir una acción del sistema (no confundir con informational).'
      - 'informational solo si pregunta qué puede hacer la app, pide ayuda/menú o lista de opciones; no usar informational para síntomas, quejas clínicas ni consultas de plantilla/conteo de profesionales del efector.'
      - 'No uses category servicio para síntomas, partes del cuerpo ni malestar; esas menciones van solo en normalized_text.'
      - 'meta: preguntas sobre el asistente o la app (no operativas).'
      - 'normalized_text: corregí ortografía y expandí abreviaturas clínicas comunes; conservá el sentido del mensaje.'
      - 'extractions: solo menciones de entidades del mundo (servicio, centro, persona), no verbos ni la acción.'
      - 'synonyms: máximo 2 strings por extracción.'

  goal_overrides:
    - when_rule: clinical_symptom
      from_goals: [informational, unclear]
      to_goal: conversational
    - when_rule: clinical_symptom
      from_goal: operational
      when_not_rule: scheduling_operational
      to_goal: conversational
    - when_any_rule: [staff_data_access_count_or_resumen, staff_data_access_list, staff_data_access_list_phrase, staff_data_access_edit]
      to_goal: operational

  heuristic_fallback:
    - when_rule: scheduling_operational
      goal: operational
    - when_any_rule: [consultas_seguimiento_followup, consultas_seguimiento_topics_only]
      goal: operational
    - when_rule: paciente_provincial_resource
      goal: operational
    - when_any_rule: [paciente_delegar_representacion, paciente_solicitar_tutela, staff_verificar_tutela]
      goal: operational
    - when_any_rule: [staff_data_access_count_or_resumen, staff_data_access_list, staff_data_access_list_phrase, staff_data_access_edit]
      goal: operational
    - when_rule: help_menu_query
      goal: informational
    - when_rule: greeting
      goal: conversational
    - when_rule: clinical_symptom
      goal: conversational

conversational_channel:
  stable_prompt: |
    Sos el asistente de Bioenlace, una aplicación de salud donde las personas reservan turnos con profesionales y centros de la red.

    Respondé en español, breve y amable (3–5 oraciones salvo que pidan más detalle).
    No inventes datos clínicos, diagnósticos ni confirmes turnos ya hechos.

    Cuando describan síntomas, lesiones o malestar:
    1) Mostrá empatía y orientación prudente (no reemplazás la consulta médica).
    2) Indicá qué tipo de profesional o servicio suele ser apropiado para evaluar ese cuadro (ej. clínica médica o medicina general, traumatología por golpe o chichón, pediatría si es un niño). No inventes nombres de médicos ni centros concretos salvo que aparezcan en el contexto clínico del paciente.
    3) Conectá con Bioenlace: explicá que pueden reservar un turno acá mismo escribiendo qué necesitan (ej. "Quiero turno con clínica médica" o "Sacar turno de traumatología").
    4) Si preguntan cómo contactar al profesional, aclaré que el contacto es agendando una consulta por la app; no des teléfonos, emails ni direcciones inventadas.

    Si piden una acción operativa concreta (turno, cancelar, ver agenda), invitalos a decirlo con sus palabras; no hace falta listar menús largos.

    Si hay historial reciente, continuá la charla sin repetir lo ya respondido.
  empty_response_fallback: >-
    Entiendo tu consulta. Te recomiendo que un profesional te evalúe en persona.
    En Bioenlace podés reservar un turno escribiendo, por ejemplo, "Quiero turno con clínica médica".
  booking_button:
    when_rule: clinical_symptom
    intent_priority:
      - atencion.necesito-atencion
      - atencion.consultas-seguimiento-flow
      - turnos.crear-como-paciente
      - turnos.crear-para-paciente
    intent_prefix_fallback: turnos.crear
    labels:
      atencion.consultas-seguimiento-flow: Consultas y seguimiento
      atencion.necesito-atencion: Asistencia guiada
      turnos.crear-como-paciente: Turno con un especialista
      turnos.crear-para-paciente: Reservar turno
