version: 1

# Validación: php yii data-access-catalog/check
# Cada {Entidad}.yaml declara entity, model (+ version_model si aplica), opcionalmente info_list y edit.
# edit.attributes: atributos editables (flow id = entity); ui_json_source a nivel entidad enlaza BD ↔ views/json.

# Sinónimos NL → filtros allowlisted (asistente / preprocess).
filter_synonyms:
  sexo_biologico:
    M: [2, varon, varones, hombre, hombres, masculino]
    F: [1, mujer, mujeres, femenino, femenina]
