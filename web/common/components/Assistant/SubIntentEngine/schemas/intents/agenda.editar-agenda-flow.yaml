intent_id: agenda.editar-agenda-flow
version: 1

action_name: "Editar agenda"
description: "Guía conversacional para seleccionar profesional y servicio, y abrir la edición de agenda."
rbac_route: "/api/agenda/editar-agenda-flow"
keywords:
  - agenda
  - editar agenda
  - modificar agenda
  - horarios
  - condición laboral

draft_keys_extra: []

subintents:
  - id: select_rrhh
    assistant_text: "Profesional"
    requires:
      - draft.id_rr_hh
    provides:
      - draft.id_rr_hh
    next: select_servicio
    open_ui:
      action_id: rrhh.listar-por-efector-acepta-turnos

  - id: select_servicio
    assistant_text: "Servicio"
    requires:
      - draft.id_rr_hh
      - draft.id_servicio
    provides:
      - draft.id_servicio
    next: configurar_agenda
    open_ui:
      action_id: rrhh.listar-servicios-en-efector
      params:
        id_rr_hh: "draft.id_rr_hh"

  - id: configurar_agenda
    assistant_text: "Agenda"
    requires:
      - draft.id_rr_hh
      - draft.id_servicio
    provides: []
    next: condicion_laboral
    open_ui:
      action_id: agenda.configurar-agenda
      params:
        id_rr_hh: "draft.id_rr_hh"
        id_servicio: "draft.id_servicio"

  - id: condicion_laboral
    assistant_text: "Condición laboral"
    requires:
      - draft.id_rr_hh
    provides: []
    next: ""
    open_ui:
      action_id: rrhh.editar-condicion-laboral
      params:
        id_rr_hh: "draft.id_rr_hh"

