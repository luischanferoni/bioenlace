intent_id: data-access.info
version: 1

action_name: "Consulta informativa staff"
description: "Conteos, totales y resúmenes autorizados sobre entidades del sistema."
rbac_route: "/api/info"
keywords:
  - cuantos hay
  - cuantos
  - conteo
  - total de
  - cantidad de
  - resumen de
  - resumen datos
  - consulta informativa

intent_semantics:
  goal: >-
    Obtener un resumen numérico o agregado autorizado (conteo, totales, distribución).
  how: >-
    Resuelve la métrica según el pedido del usuario y abre /api/info con los filtros inferidos.
  outcome:
    - El staff obtiene el dato agregado sin listar filas nominadas.

draft_hydrator:
  handler: data_access.metric_flow
  channel: info

subintents:
  - id: ejecutar_consulta
    assistant_text: "Consulta informativa"
    next: ""
    open_ui:
      action_id: data-access.info
      params:
        metric_id: "draft.metric_id"
        id_efector: "draft.id_efector"
        servicio_rol: "draft.servicio_rol"
        servicio_rol_mention: "draft.servicio_rol_mention"
        sexo_biologico: "draft.sexo_biologico"
