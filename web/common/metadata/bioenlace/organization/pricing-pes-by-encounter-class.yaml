# Precio orientativo por profesional × encounter_class (USD / mes, sin IVA).
# Fórmula: precio_clase = COGS_ref × (vol_clase/ref) × (1 + margin_on_cost_percent/100)
# COGS: web/docs/costos/costos-api.md (sin context caching; Gemini + Groq; Twilio §6).
# Actualizar también institucional/js/pricing-config.json al cambiar cifras.
version: 2
currency: USD
billing_period: month
tax_note: No incluye IVA ni IIBB.

default_when_empty: allow_all

# Volumen de referencia costos-api (AMB): 400 encounters/prof/mes.
reference_encounters_per_professional_month: 400

# COGS variable por profesional/mes a volumen reference (400).
# base = Apartado 1 motivos texto SIN STT del profesional (~1,24 − 0,28).
# audio = STT Groq del dictado del profesional (§4).
# videollamada = Twilio Video §6 (solo clases que lo permiten, tip. AMB).
cogs_usd_per_professional_month:
  base: 0.96
  audio: 0.28
  videollamada: 11.52

# 233 % ≈ margen bruto ~70 %.
margin_on_cost_percent: 233

cogs_source: web/docs/costos/costos-api.md — COGS base sin context caching

addons:
  audio:
    label: Audio (dictado del profesional)
    description: Transcripción del audio del personal médico. En urgencia e internación ya está incluido.
    default: false
  videollamada:
    label: Videollamada
    description: Teleconsulta (referencia Twilio). Solo aplica a ambulatorio.
    default: false

# Volúmenes = atenciones o evoluciones por profesional/mes (época normal, no pico).
# EMER/IMP: más audio, sin videollamada. Picos y hospitales muy grandes → más profesionales o cotización.
sellable_classes:
  AMB:
    label: Ambulatorio
    short: Consultorios y turnos
    encounters_per_professional_month: 400
    audio_included: false
    videollamada_allowed: true
    includes:
      - Agenda de cupos y reserva paciente
      - Captura clínica AMB
      - App paciente (turnos)
    product_gates:
      - session_encounter_class
      - amb_agenda
      - patient_booking
  EMER:
    label: Urgencia / guardia
    short: Tablero y plantel de guardia
    # Ref. normal ~195–455/prof; lista usa ~350 (centro). Pico 455–780+ no se lista aparte.
    encounters_per_professional_month: 350
    audio_included: true
    videollamada_allowed: false
    includes:
      - Cobertura / roster EMER
      - Tablero de guardia
      - Captura clínica EMER (audio incluido)
    product_gates:
      - session_encounter_class
      - emer_cobertura
      - emer_tablero
  IMP:
    label: Internación
    short: Piso, camas y evoluciones
    # Ref. normal típico ~100–960 evoluciones/prof; lista usa 300 (chico–mediano).
    # Hospitales grandes (960–2400+) escalan con más profesionales o cotización.
    encounters_per_professional_month: 300
    audio_included: true
    videollamada_allowed: false
    includes:
      - Cobertura / roster IMP
      - Mapa de camas
      - Captura / evoluciones (audio incluido)
    product_gates:
      - session_encounter_class
      - imp_cobertura
      - imp_mapa

non_sellable_default: disabled

simulator:
  title: Calculá tu licencia
  subtitle: Elegí los tipos de atención y cuántos profesionales necesitás. En ambulatorio podés sumar audio o videollamada; en urgencia e internación el audio ya va incluido.
  cta_label: Pedir cotización
  cta_href: "#contacto"
  footnotes:
    - Volúmenes de referencia por profesional/mes (época normal): ambulatorio 400, urgencia 350, internación 300. Los picos se cubren con más profesionales o cotización.
    - Lo no contratado no aparece en la sesión operativa ni en tableros de esa clase.
