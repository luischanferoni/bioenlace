intent_id: personas.designar-representante-flow
version: 1

action_name: "Designar representante"
description: "El paciente con cuenta autoriza a otra persona con cuenta para operar en su nombre (activo de inmediato)."
rbac_route: "/api/person-representation/designar-representante"
keywords:
  - designar representante
  - delegar cuenta
  - delegar gestión de turnos
  - delegar gestion de turnos
  - autorizar familiar
  - quien opera por mí
  - representante
  - paciente a cargo

intent_semantics:
  summary: >-
    Autorizá a otra persona con cuenta para gestionar turnos y gestiones en tu nombre.
  capabilities:
    - designar_representante
  goal: >-
    El paciente designa a otra persona con cuenta para operar en su nombre (régimen B).
  how: >-
    Buscar representante por documento → confirmar → vínculo activo sin aprobación del centro.
  preconditions:
    - Paciente autenticado con cuenta propia.
  outcome:
    - Representante activo con permisos v1 (turnos, motivos, pre-consulta, tratamiento, HC).
  keyphrases:
    - delegar gestión de turnos
    - delegar la gestión de turnos
    - que otra persona gestione mis turnos
    - autorizar a un familiar para turnos
    - designar quién opera por mí

subintents:
  - id: gestionar_delegacion
    assistant_text: "Designar representante"
    provides: []
    next: ""
    open_ui:
      action_id: person-representation.hub
      client_open:
        kind: native
        mobile:
          screen_id: person_representation_hub

flow_submit:
  action_id: person-representation.designar-representante
