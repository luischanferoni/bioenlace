intent_id: licencia.cargar-como-profesional-flow
version: 1

action_name: "Cargar licencia"
description: "Para registrar una licencia o permiso sobre uno de tus servicios en el efector."
rbac_route: "/api/profesional-efector-servicio/cargar-licencia-como-profesional-flow"
keywords:
  - licencia
  - cargar licencia
  - solicitar licencia
  - pedir licencia
  - permiso
  - vacaciones
  - ausencia
  - licencia médica
  - licencia medica
  - darme de baja

intent_semantics:
  goal: >-
    Registrar una condición laboral con vigencia (licencia, permiso o ausencia) sobre una asignación propia PES en el efector.
  how: >-
    Elegís el servicio afectado, completás tipo de licencia y fechas; se persiste al guardar el formulario y el flujo cierra con confirmación.
  preconditions:
    - Profesional autenticado con asignación en el efector de sesión.
  constraints:
    - Solo sobre tus propias asignaciones (PES); no podés cargar licencias de otro médico.
    - El tipo de licencia proviene del catálogo `condiciones_laborales` del establecimiento.
  outcome:
    - Condición laboral vigente registrada en `profesional_efector_servicio_condicion_laboral`.
  keyphrases:
    - avisar que no voy a trabajar un período
    - registrar vacaciones o licencia en mi servicio
    - informar ausencia programada

draft_keys_extra:
  - condicion_laboral_ui_completed

business_rules:
  - id: licencia_propia_vs_staff
    when: pre_flow
    checker: content_regex
    require_any:
      - "licencia|permiso|vacacion|vacaciones|ausencia|franco|darme de baja"
    forbid_any:
      - "otro|otra|del médico|del medico|del doctor|del profesional|para el|para la|secretaría|secretaria"
    user_message: >-
      ¿Querés cargar una licencia propia o la de otro profesional del efector?
    remediation:
      - id: mi_licencia
        label: "Mi licencia (mis servicios)"
        intent_id: licencia.cargar-como-profesional-flow
        reset_flow: true
      - id: otro_profesional
        label: "Licencia de otro profesional (staff)"
        intent_id: licencia.cargar-para-profesional-flow
        reset_flow: true

subintents:
  - id: select_servicio
    assistant_text: "Servicio"
    provides:
      - draft.id_servicio
      - draft.id_profesional_efector_servicio
    next: cargar_licencia
    open_ui:
      action_id: profesional-efector-servicio.listar-mis-servicios-en-efector

  - id: cargar_licencia
    assistant_text: "Licencia"
    provides:
      - draft.condicion_laboral_ui_completed
      - draft.id_condicion_laboral
      - draft.fecha_inicio
      - draft.fecha_fin
    requires:
      - draft.id_profesional_efector_servicio
      - draft.id_servicio
    next: ""
    open_ui:
      action_id: profesional-efector-servicio.cargar-licencia-como-profesional
      params:
        id_profesional_efector_servicio: "draft.id_profesional_efector_servicio"
        id_servicio: "draft.id_servicio"

flow_submit:
  action_id: profesional-efector-servicio.cargar-licencia-como-profesional-flow
  params:
    id_profesional_efector_servicio: "draft.id_profesional_efector_servicio"
    id_servicio: "draft.id_servicio"
    id_condicion_laboral: "draft.id_condicion_laboral"
    fecha_inicio: "draft.fecha_inicio"
    fecha_fin: "draft.fecha_fin"
