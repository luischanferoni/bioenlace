intent_id: agenda.crear-rrhh-flow
version: 1

action_name: "Crear recurso humano"
rbac_route: "/api/agenda/crear-agenda-flow"
keywords:
  - agenda
  - cargar agenda
  - cargar la agenda
  - crear recurso humano
  - agregar recurso humano
  - agregar profesional
  - agenda médico
  - agenda medico
  - horarios médico
  - horarios medico

intent_semantics:
  goal: >-
    Configurar una agenda de atención para un profesional, asegurando que quede asociado a un servicio que habilite la gestión de turnos.
  how: >-
    Selecciona o incorpora el profesional, selecciona el servicio, y si el servicio habilita turnos continúa a configurar la agenda.
  preconditions:
    - Existe (o se puede seleccionar) el profesional/recurso humano.
    - Se puede seleccionar un servicio en el efector.
  constraints:
    - La agenda se configura solo si el servicio asociado habilita turnos (si no, primero se debe completar la asociación/condición laboral).
  outcome:
    - Profesional asociado a un servicio.
    - Agenda configurada si corresponde.
  keyphrases:
    - configurar disponibilidad del profesional
    - asociar profesional a servicio con turnos
    - alta y asociación antes de cargar horarios

draft_keys_extra:
  - servicio_acepta_turnos

business_rules:
  - id: agenda_alta_vs_solo_horarios
    when: pre_flow
    checker: content_regex
    require_any:
      - "(cargar|configurar|editar|modificar|actualizar).*(agenda|horario)"
      - "m[eé]dico|profesional|doctor"
    forbid_any:
      - "crear|agregar|nuevo|alta|asociar|recurso humano|rrhh"
    user_message: >-
      Parece que querés trabajar con agenda u horarios de un profesional.
      ¿Necesitás el flujo completo (asociar profesional y servicio) o solo cargar horarios porque ya tiene el servicio con turnos?
    remediation:
      - id: flujo_completo
        label: "Flujo completo (profesional / servicio / agenda si aplica)"
        intent_id: agenda.crear-rrhh-flow
        reset_flow: true
      - id: solo_agenda
        label: "Solo horarios (ya tiene servicio que acepta turnos)"
        intent_id: agenda.editar-agenda-flow
        reset_flow: true

subintents:
  - id: select_rrhh
    assistant_text: "Profesional"
    provides:
      - draft.id_rr_hh
    next: select_servicio
    open_ui:
      action_id: rrhh.listar-por-efector-acepta-turnos

  - id: select_servicio
    assistant_text: "Servicio"
    requires:
      - draft.id_rr_hh
    provides:
      - draft.id_servicio
    next_routing:
      - when:
          draft_equals:
            servicio_acepta_turnos: "SI"
        next: configurar_agenda
    open_ui:
      action_id: rrhh.listar-servicios-en-efector
      params:
        id_rr_hh: "draft.id_rr_hh"

  - id: configurar_agenda
    assistant_text: "Agenda"
    requires:
      - draft.id_rr_hh
      - draft.id_servicio
    next: ""
    open_ui:
      action_id: agenda.configurar-agenda
      params:
        id_rr_hh: "draft.id_rr_hh"
        id_servicio: "draft.id_servicio"
