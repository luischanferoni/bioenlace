intent_id: urgencias.triage-paciente-guardia
version: 1

action_name: "Triage en guardia"
description: "Registrar o actualizar triage Manchester de un paciente en guardia."
rbac_route: "/api/clinical/emergency-guardia/registrar-triage"
keywords:
  - triage
  - clasificar urgencia
  - prioridad guardia
  - manchester
  - enfermería triage

intent_semantics:
  goal: >-
    Clasificar la urgencia del paciente y ordenar la cola.
  how: >-
    Necesita el id de guardia; en la app móvil o web se abre el formulario de triage.
  outcome:
    - Prioridad y motivo quedan registrados en el episodio.

subintents:
  - id: solicitar_guardia_id
    assistant_text: "Indicá el número de ingreso en guardia (id) del paciente"
    provides:
      - draft.guardia_id
    next: registrar_triage

  - id: registrar_triage
    assistant_text: "Completá nivel (1–5) y motivo en el tablero o formulario de triage"
    requires:
      - draft.guardia_id
    provides: []
    next: ""
